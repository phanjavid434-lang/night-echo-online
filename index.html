<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>夜·回声 Echo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05060a; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; color:#cfe8ff; }
  #wrap { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; background:radial-gradient(circle at 50% 40%, rgba(20,30,55,.55), rgba(5,6,10,.92)); backdrop-filter:blur(2px); z-index:10; }
  .overlay.hidden { display:none; }
  h1 { font-size:clamp(34px,9vw,72px); letter-spacing:.18em; font-weight:700; color:#eaf6ff; text-shadow:0 0 24px rgba(90,160,255,.65),0 0 60px rgba(70,120,255,.35); }
  h1 small { display:block; font-size:.26em; letter-spacing:.5em; color:#7fa6d8; margin-top:14px; font-weight:400; }
  /* 开始界面：标题字形 + 微动效 */
  #startScreen h1 { position:relative; font-weight:800; letter-spacing:.22em; background:linear-gradient(180deg,#f4f9ff 0%,#c4ddff 52%,#6f9fe0 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; filter:drop-shadow(0 0 26px rgba(90,160,255,.55)); animation:titleIn 1.1s cubic-bezier(.2,.8,.2,1) both, titleGlow 4.4s ease-in-out 1.2s infinite; }
  #startScreen h1::after { content:''; position:absolute; inset:-12% -8%; pointer-events:none; background:linear-gradient(105deg, transparent 40%, rgba(195,222,255,.5) 50%, transparent 60%); mix-blend-mode:screen; transform:translateX(-130%); animation:titleSheen 6s ease-in-out 1.6s infinite; }
  #startScreen h1 small { -webkit-text-fill-color:#7fa6d8; filter:none; animation:subFloat 4.6s ease-in-out infinite; }
  #startScreen .desc { animation:startRise .9s ease .15s both; }
  #startScreen .keys { animation:startRise .9s ease .28s both; }
  #startScreen .charTitle, #startScreen .charSelect { animation:startRise .9s ease .4s both; }
  #startScreen #startBtn { animation:startRise .9s ease .62s both; }
  #startScreen #onlineStartBtn { animation:startRise .9s ease .52s both, ctaPulse 2.8s ease-in-out 1.4s infinite; }
  @keyframes titleIn { 0%{ opacity:0; transform:translateY(24px) scale(.93); filter:drop-shadow(0 0 0 rgba(90,160,255,0)) blur(7px); } 100%{ opacity:1; transform:none; filter:drop-shadow(0 0 26px rgba(90,160,255,.55)) blur(0); } }
  @keyframes titleGlow { 0%,100%{ filter:drop-shadow(0 0 20px rgba(90,160,255,.42)); } 50%{ filter:drop-shadow(0 0 42px rgba(112,176,255,.88)); } }
  @keyframes titleSheen { 0%{ transform:translateX(-130%); } 24%,100%{ transform:translateX(130%); } }
  @keyframes subFloat { 0%,100%{ opacity:.68; letter-spacing:.5em; } 50%{ opacity:1; letter-spacing:.6em; } }
  @keyframes startRise { 0%{ opacity:0; transform:translateY(16px); } 100%{ opacity:1; transform:none; } }
  @keyframes ctaPulse { 0%,100%{ box-shadow:0 0 26px rgba(70,130,255,.5); } 50%{ box-shadow:0 0 48px rgba(92,155,255,.9); } }
  p.desc { max-width:520px; margin:22px auto 0; line-height:1.9; font-size:clamp(13px,3.6vw,16px); color:#9fc0e6; }
  .keys { margin-top:18px; font-size:13px; color:#6f8cb5; line-height:2; }
  .keys b { color:#bcd9ff; font-weight:600; }
  button.start { margin-top:30px; padding:15px 42px; font-size:17px; letter-spacing:.12em; color:#eaf6ff; background:linear-gradient(135deg,#2b5cff,#5a9bff); border:none; border-radius:40px; cursor:pointer; box-shadow:0 0 30px rgba(70,130,255,.55); transition:transform .12s, box-shadow .2s; }
  button.start:hover { transform:translateY(-2px); box-shadow:0 0 44px rgba(90,150,255,.8); }
  button.start:active { transform:translateY(0); }
  button.onlineStart { border:1px solid rgba(125,240,200,.5); background:linear-gradient(135deg,#0ea37d,#2b9cff); box-shadow:0 0 34px rgba(80,220,190,.5); }
  button.onlineStart:hover { box-shadow:0 0 48px rgba(90,230,210,.78); }
  button.soloStart { background:linear-gradient(135deg,#454c66,#5a6b8f); box-shadow:none; }
  button.lobbyGhost { margin-top:12px; padding:11px 24px; font-size:14px; background:rgba(16,26,48,.62); border:1px solid rgba(120,180,255,.26); box-shadow:none; }
  button.start:disabled { opacity:.55; cursor:default; transform:none; box-shadow:none; }
  .charTitle { margin-top:30px; font-size:13px; letter-spacing:.16em; color:#8fb0d8; }
  .charSelect { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:14px; max-width:560px; }
  .charCard { display:flex; flex-direction:column; align-items:center; gap:7px; width:112px; padding:14px 8px; border-radius:16px; border:1px solid rgba(90,140,220,.25); background:rgba(15,25,45,.4); cursor:pointer; transition:transform .12s, border-color .2s, background .2s, box-shadow .2s; }
  .charCard:hover { transform:translateY(-3px); }
  .charCard.sel { border-color:rgba(120,180,255,.9); background:rgba(40,70,130,.45); box-shadow:0 0 22px rgba(70,130,255,.4); }
  .charCard .dot { width:22px; height:22px; border-radius:50%; }
  .charCard .cn { font-size:14px; color:#dcebff; font-weight:600; letter-spacing:.06em; }
  .charCard .cd { font-size:11px; color:#7a93bb; line-height:1.5; text-align:center; }
  #hud { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:14px 18px; font-size:14px; letter-spacing:.08em; z-index:5; pointer-events:none; text-shadow:0 0 10px rgba(0,0,0,.8); }
  #hud .pill { background:rgba(15,25,45,.5); border:1px solid rgba(90,140,220,.25); border-radius:30px; padding:7px 15px; }
  #hud .hud-left { display:flex; gap:10px; }
  #lives { color:#ff7a9c; }
  #orbs { color:#7df0c8; }
  #level { color:#ffd66b; }
  #pulseBtn { position:absolute; right:24px; bottom:30px; width:92px; height:92px; border-radius:50%; border:2px solid rgba(120,180,255,.5); background:radial-gradient(circle,rgba(60,110,220,.45),rgba(20,35,70,.3)); color:#dcebff; font-size:14px; letter-spacing:.1em; z-index:6; display:none; align-items:center; justify-content:center; user-select:none; }
  #pulseBtn:active { background:radial-gradient(circle,rgba(90,150,255,.7),rgba(30,50,100,.4)); }
  #muteBtn { position:absolute; top:50px; right:14px; width:40px; height:40px; border-radius:50%; border:1px solid rgba(120,180,255,.35); background:rgba(15,25,45,.5); color:#bcd9ff; font-size:16px; z-index:7; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; }
  #menuBtn { position:absolute; top:50px; left:14px; width:40px; height:40px; border-radius:50%; border:1px solid rgba(120,180,255,.35); background:rgba(15,25,45,.5); color:#bcd9ff; font-size:18px; z-index:7; display:none; align-items:center; justify-content:center; cursor:pointer; user-select:none; }
  .setRow { display:flex; align-items:center; gap:10px; margin-top:16px; font-size:14px; color:#bcd9ff; }
  .setRow .lab { width:84px; text-align:right; color:#8fb0d8; }
  .segBtn, .tglBtn { padding:8px 16px; border-radius:20px; border:1px solid rgba(120,180,255,.3); background:rgba(20,35,70,.4); color:#cfe8ff; cursor:pointer; font-size:13px; transition:all .15s; }
  .segBtn.sel, .tglBtn.on { background:linear-gradient(135deg,#2b5cff,#5a9bff); border-color:transparent; box-shadow:0 0 16px rgba(70,130,255,.5); color:#fff; }
  .hint { position:absolute; bottom:14px; left:0; right:0; text-align:center; font-size:12px; color:#5b76a0; z-index:5; pointer-events:none; }
  #interScreen{ background:radial-gradient(ellipse at 50% 38%, rgba(20,30,55,.5), rgba(2,4,10,.97)); overflow:hidden; }
  #interScreen::before{ content:''; position:absolute; inset:0; pointer-events:none; background:repeating-linear-gradient(0deg, rgba(255,255,255,.035), rgba(255,255,255,.035) 1px, transparent 2px, transparent 4px); animation:scan 7s linear infinite; }
  #interScreen::after{ content:''; position:absolute; inset:0; pointer-events:none; box-shadow:inset 0 0 200px rgba(0,0,0,.92); }
  @keyframes scan{ to{ background-position:0 -240px; } }
  .interFrame{ position:relative; z-index:2; text-align:center; width:min(560px,87vw); padding:30px 26px 26px; border:1px solid rgba(var(--accent,140,180,255),.4); border-radius:4px; background:linear-gradient(180deg, rgba(10,16,30,.62), rgba(6,10,20,.42)); box-shadow:0 0 60px rgba(var(--accent,140,180,255),.13), inset 0 0 46px rgba(0,0,0,.55); }
  .interFrame::before,.interFrame::after{ content:''; position:absolute; width:20px; height:20px; border:2px solid rgba(var(--accent,140,180,255),.85); }
  .interFrame::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .interFrame::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
  .depth{ font:600 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.32em; color:rgba(var(--accent,140,180,255),.9); margin-bottom:14px; }
  .interTitle{ margin:0; font-size:clamp(30px,8vw,58px); font-weight:800; letter-spacing:.06em; color:#eaf2ff; text-shadow:0 0 26px rgba(var(--accent,140,180,255),.7); }
  .interHint{ margin-top:10px; font:500 12.5px/1.6 ui-monospace,Menlo,monospace; letter-spacing:.1em; color:rgba(var(--accent,140,180,255),.78); }
  .interMono{ max-width:440px; margin:18px auto 4px; font:italic 500 16px/1.85 Georgia,serif; color:#cfe0ff; }
  .warnTag{ display:inline-block; margin:18px 0 0; padding:4px 14px; border:1px solid rgba(255,90,90,.7); border-radius:2px; font:800 12px/1 ui-monospace,monospace; letter-spacing:.28em; color:#ff9a9a; animation:warnB .8s steps(2) infinite; }
  @keyframes warnB{ 50%{ opacity:.3; } }
  .enemyCard{ display:flex; align-items:center; gap:14px; margin:14px auto 0; padding:13px 16px; border-radius:4px; border:1px solid rgba(var(--accent,140,180,255),.32); background:rgba(8,14,28,.6); max-width:430px; text-align:left; }
  .enemyCard .ed{ width:30px; height:30px; border-radius:50%; flex:0 0 auto; }
  .enemyCard .et{ font:700 13px/1 ui-monospace,Menlo,monospace; letter-spacing:.12em; color:#eaf2ff; }
  .enemyCard .ec{ font-size:12.5px; color:#9fb8d8; line-height:1.6; margin-top:5px; }
  .loadWrap{ margin:24px auto 0; max-width:430px; }
  .loadBar{ height:6px; border-radius:3px; background:rgba(255,255,255,.08); overflow:hidden; }
  .loadFill{ display:block; height:100%; width:0%; border-radius:3px; background:linear-gradient(90deg, rgba(var(--accent,140,180,255),.45), rgba(var(--accent,140,180,255),1)); box-shadow:0 0 14px rgba(var(--accent,140,180,255),.8); transition:width .12s linear; }
  .loadPct{ margin-top:8px; font:600 11px/1 ui-monospace,Menlo,monospace; letter-spacing:.26em; color:rgba(var(--accent,140,180,255),.85); text-align:right; }
  .contPrompt{ margin-top:22px; font:700 14px/1 ui-monospace,Menlo,monospace; letter-spacing:.2em; color:#eaf2ff; animation:blink 1.1s ease-in-out infinite; }
  .contPrompt.hidden{ display:none; }
  @keyframes blink{ 50%{ opacity:.22; } }
  /* 关卡过场：全屏电影感（渐暗 + 黑边 + 独白铺满全屏） */
  #interScreen.cine{ background:#02030a; }
  #interScreen.cine::before{ opacity:.5; }
  #interScreen.cine::after{ box-shadow:inset 0 0 300px rgba(0,0,0,.96); }
  .interFull{ position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:11vh 7vw; }
  .cineStage{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; width:100%; max-width:780px; transform-origin:center 47%; animation:cinePush 11s ease-out both; will-change:transform; }
  @keyframes cinePush{ 0%{ transform:scale(1); } 100%{ transform:scale(1.085); } }
  .interFull::before, .interFull::after{ content:''; position:absolute; left:0; right:0; height:9vh; background:#000; z-index:4; animation:barsIn 1.15s cubic-bezier(.2,.8,.2,1) both; }
  .interFull::before{ top:0; transform-origin:top; }
  .interFull::after{ bottom:0; transform-origin:bottom; }
  @keyframes barsIn{ 0%{ transform:scaleY(2.6); } 100%{ transform:scaleY(1); } }
  .fullDepth{ font:600 13px/1 ui-monospace,Menlo,monospace; letter-spacing:.5em; color:rgba(var(--accent,140,180,255),.85); animation:monoRise .9s ease both; }
  .fullTitle{ margin:0; font-size:clamp(46px,13vw,128px); font-weight:800; letter-spacing:.1em; line-height:1.02; background:linear-gradient(180deg,#f4f9ff 0%,#c4ddff 55%,#6f9fe0 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; filter:drop-shadow(0 0 42px rgba(var(--accent,140,180,255),.6)); animation:cineTitle 1.5s cubic-bezier(.2,.8,.2,1) both, titleGlow 4.4s ease-in-out 1.6s infinite; }
  .fullHint{ font:500 14px/1.6 ui-monospace,Menlo,monospace; letter-spacing:.12em; color:rgba(var(--accent,140,180,255),.8); animation:monoRise 1.1s ease .25s both; }
  .fullMono{ max-width:min(720px,86vw); margin:16px auto 0; font:italic 500 clamp(17px,3.4vw,25px)/1.95 Georgia,serif; color:#dceaff; text-shadow:0 0 26px rgba(0,0,0,.85); animation:monoRise 2s ease .6s both; }
  .interFull .enemyCard, .interFull .rankRow{ animation:monoRise 1.4s ease .9s both; }
  .interFull .contPrompt{ margin-top:26px; }
  @keyframes cineTitle{ 0%{ opacity:0; transform:translateY(34px) scale(.9); filter:blur(12px); letter-spacing:.42em; } 100%{ opacity:1; transform:none; filter:blur(0) drop-shadow(0 0 42px rgba(140,180,255,.55)); letter-spacing:.1em; } }
  @keyframes monoRise{ 0%{ opacity:0; transform:translateY(14px); filter:blur(5px); } 100%{ opacity:1; transform:none; filter:blur(0); } }
  @keyframes interVeil{ 0%{ opacity:0; } 100%{ opacity:1; } }
  .rankRow{ display:flex; align-items:center; justify-content:center; gap:14px; margin:16px auto 2px; }
  .rankBig{ font:800 38px/1 ui-monospace,Menlo,monospace; color:rgb(var(--rc,200,210,230)); text-shadow:0 0 22px rgba(var(--rc,200,210,230),.7); }
  .rankMeta{ font:600 12px/1.5 ui-monospace,Menlo,monospace; letter-spacing:.06em; color:rgba(var(--rc,200,210,230),.85); text-align:left; }
  .perkRow{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:20px auto 4px; max-width:520px; }
  .perkCard{ width:142px; padding:16px 12px; border-radius:12px; border:1px solid rgba(150,200,255,.35); background:rgba(15,28,52,.5); cursor:pointer; transition:transform .12s, border-color .2s, box-shadow .2s, background .2s; }
  .perkCard:hover{ transform:translateY(-3px); border-color:rgba(150,210,255,.9); box-shadow:0 0 22px rgba(90,150,255,.4); background:rgba(35,60,110,.5); }
  .perkName{ font:700 15px/1.2 sans-serif; color:#eaf4ff; letter-spacing:.04em; }
  .perkDesc{ margin-top:8px; font:500 12px/1.5 sans-serif; color:#9fc0e6; }
  .cardPick{ position:relative; width:150px; min-height:208px; padding:16px 12px 14px; border-radius:14px; border:1.5px solid rgba(var(--cc,150,190,230),.75); background:linear-gradient(180deg, rgba(var(--cc,150,190,230),.16), rgba(8,14,28,.85)); box-shadow:0 0 26px rgba(var(--cc,150,190,230),.18), inset 0 0 30px rgba(0,0,0,.5); cursor:pointer; transition:transform .14s, box-shadow .2s, border-color .2s, opacity .2s; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .cardPick:hover{ transform:translateY(-8px) scale(1.03); box-shadow:0 0 40px rgba(var(--cc,150,190,230),.55), inset 0 0 30px rgba(0,0,0,.4); border-color:rgba(var(--cc,150,190,230),1); }
  .cardPick.dim{ opacity:.32; transform:scale(.95); filter:saturate(.4); }
  .cardRare{ font:700 10px/1 ui-monospace,monospace; letter-spacing:.26em; color:rgba(var(--cc,150,190,230),.95); }
  .cardIco{ width:54px; height:54px; margin-top:4px; border-radius:50%; display:flex; align-items:center; justify-content:center; font:800 26px/1 sans-serif; color:#0a0f1c; background:radial-gradient(circle at 38% 32%, rgba(var(--cc,150,190,230),1), rgba(var(--cc,150,190,230),.55)); box-shadow:0 0 22px rgba(var(--cc,150,190,230),.8); }
  .cardName{ font:800 17px/1.2 sans-serif; color:#eef5ff; letter-spacing:.04em; }
  .cardDesc{ font:500 12px/1.55 sans-serif; color:#bcd4ee; padding:0 2px; }
  .cardFlav{ margin-top:auto; font:italic 500 11px/1.5 Georgia,serif; color:rgba(var(--cc,150,190,230),.72); }
  .lvPick{ display:flex; align-items:center; gap:10px; justify-content:center; margin-top:22px; flex-wrap:wrap; }
  .lvPickLab{ font-size:13px; letter-spacing:.14em; color:#8fb0d8; }
  .lvSel{ padding:11px 16px; font-size:15px; border-radius:24px; border:1px solid rgba(120,180,255,.4); background:rgba(20,35,70,.55); color:#eaf6ff; cursor:pointer; outline:none; }
  .lvSel option{ background:#0b1426; color:#eaf6ff; }
  .lvGo{ margin-top:0 !important; padding:11px 30px !important; font-size:15px !important; }
  #onlinePanel { position:absolute; left:14px; bottom:18px; z-index:7; display:flex; align-items:center; gap:8px; padding:8px 10px; border:1px solid rgba(120,180,255,.28); border-radius:30px; background:rgba(8,14,28,.62); backdrop-filter:blur(5px); box-shadow:0 0 18px rgba(0,0,0,.3); }
  #onlinePanel input { width:92px; height:30px; border:1px solid rgba(120,180,255,.28); border-radius:18px; background:rgba(4,8,18,.8); color:#dcebff; padding:0 10px; outline:none; font-size:12px; letter-spacing:.04em; }
  #onlinePanel button { height:30px; padding:0 14px; border:0; border-radius:18px; background:linear-gradient(135deg,#2b5cff,#5a9bff); color:#fff; font-weight:700; letter-spacing:.08em; cursor:pointer; }
  #onlineStatus { min-width:54px; color:#7a93bb; font-size:12px; letter-spacing:.06em; text-align:center; }
  #onlineStatus.on { color:#78f0c8; text-shadow:0 0 12px rgba(120,240,200,.45); }
  #onlineLobbyScreen { z-index:12; background:radial-gradient(circle at 50% 35%, rgba(17,44,72,.72), rgba(2,5,12,.96)); }
  .lobbyShell { width:min(680px,92vw); max-height:88vh; overflow:auto; padding:28px 22px 24px; border:1px solid rgba(120,210,230,.32); border-radius:8px; background:linear-gradient(180deg, rgba(8,18,34,.84), rgba(5,9,18,.72)); box-shadow:0 0 70px rgba(45,160,220,.18), inset 0 0 46px rgba(0,0,0,.42); }
  .lobbyKicker { font:700 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.28em; color:#78f0c8; }
  .lobbyTitle { margin-top:12px; font-size:clamp(28px,7vw,54px); letter-spacing:.18em; }
  .lobbySub { max-width:520px; margin:16px auto 0; line-height:1.8; color:#9fc0e6; font-size:14px; }
  .roomTag { display:inline-flex; align-items:center; gap:10px; margin-top:18px; padding:8px 14px; border-radius:999px; border:1px solid rgba(120,180,255,.28); background:rgba(8,14,28,.56); font:700 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.12em; color:#dcebff; }
  .lobbyPlayers { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin:22px auto 0; max-width:520px; }
  .lobbyPlayer { min-height:74px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; border:1px solid rgba(120,180,255,.24); border-radius:8px; background:rgba(12,22,42,.58); }
  .lobbyPlayer.me { border-color:rgba(120,240,200,.58); box-shadow:0 0 18px rgba(80,220,190,.14); }
  .lobbyPlayerTop { display:flex; align-items:center; justify-content:center; gap:8px; min-height:24px; }
  .lobbyPlayer span { font-size:13px; color:#dcebff; }
  .lobbyPlayer b { font:700 11px/1 ui-monospace,Menlo,monospace; letter-spacing:.16em; color:#7a93bb; }
  .lobbyPlayer.ready b, .lobbyPlayer.voted b { color:#78f0c8; }
  .lobbyKickBtn { height:22px; padding:0 9px; border:1px solid rgba(255,120,120,.42); border-radius:999px; background:rgba(70,18,26,.58); color:#ffd7d7; cursor:pointer; font:700 10px/1 ui-monospace,Menlo,monospace; letter-spacing:.08em; }
  .lobbyKickBtn:hover { border-color:rgba(255,150,150,.78); background:rgba(100,26,34,.76); }
  .lobbyActions { display:flex; justify-content:center; align-items:center; gap:12px; flex-wrap:wrap; margin-top:24px; }
  .voteGrid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; margin:22px auto 0; max-width:520px; }
  .levelVoteBtn { min-height:58px; border:1px solid rgba(120,180,255,.28); border-radius:8px; background:rgba(12,22,42,.68); color:#dcebff; cursor:pointer; font:800 18px/1 ui-monospace,Menlo,monospace; transition:transform .12s, border-color .2s, background .2s, box-shadow .2s; }

    if(!actx||!master) return;

      const o=actx.createOscillator(), g=actx.createGain(), f=actx.createBiquadFilter();
      o.type=type||'sine'; o.frequency.value=freq;
      f.type='lowpass'; f.frequency.value=1300;
      o.connect(f); f.connect(g); g.connect(master);
      const t=actx.currentTime;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(vol||0.04,t+0.08);
      g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||1.6));

      const o3=actx.createOscillator(); o3.type='triangle'; o3.frequency.value=110; o3.detune.value=5;

      ambient=null;
    }
  }

  function mergePeerState(id,st){

    const rvx=(Number(st.vx)||0)*W, rvy=(Number(st.vy)||0)*H;
    const nextLevel=Number(st.level)||1;
    const seq=Number(st.seq)||0;
    let peer=online.peers.get(id);
    if(peer && seq && peer.lastSeq && seq<=peer.lastSeq) return;
    const sample={x:rx,y:ry,vx:rvx,vy:rvy,time:seen,seq};
    if(!peer){
      peer={id,x:rx,y:ry,shadowX:rx,shadowY:ry,renderVx:rvx,renderVy:rvy,vx:rvx,vy:rvy,trail:[],seen,lastTrail:0,lastSampleTime:seen,jitter:0,history:[sample],level:nextLevel,running:!!st.running,char:st.char||'glow',lastSeq:seq,down:!!st.down,dead:!!st.dead,reviveProgress:0};

    boss={ x:W*0.5, y:H*0.38, r:50, hits:0, need:7+bossNum*2, phase:1, st:'idle', t:1.4, exposed:0, invuln:0, ang:0, ang2:0, beamA:0, beamA2:0, beamActive:0, tele:0, cx:0, cy:0, eye:0, vx:0, vy:0, block:0, open:0, pupil:0.25, lookA:0, num:bossNum, bcount:0, fireTimer:0 };
    const defs=[{type:'shield',col:'120,230,255',label:'护'},{type:'dash',col:'120,255,180',label:'疾'},{type:'silence',col:'190,140,255',label:'静'}];
    const def=defs[Math.floor(Math.random()*defs.length)];
    items.push({x:W*0.5,y:H*0.62,type:def.type,col:def.col,label:def.label,light:0,phase:0,got:false});
    const def2=defs[Math.floor(Math.random()*defs.length)];
    items.push({x:W*0.25,y:H*0.5,type:def2.type,col:def2.col,label:def2.label,light:0,phase:0,got:false});
  }

  function losClear(x0,y0,x1,y1){
    const steps=Math.ceil(Math.hypot(x1-x0,y1-y0)/12);
    for(let i=1;i<steps;i++){ const x=x0+(x1-x0)*i/steps, y=y0+(y1-y0)*i/steps; if(!pointClearOfWalls(x,y,0)) return false; }
    return true;
  }

  function bossDefeated(){
    const bx=boss.x, by=boss.y;
    const k = boss.kind;
    const dcol = k==='shard' ? '255,228,160' : (k==='chorus' ? '180,210,255' : (k==='devour' ? '200,160,255' : '255,210,120'));
    for(let i=0;i<60;i++) particles.push({x:bx,y:by,vx:rand(-7,7),vy:rand(-7,7),life:1.4,col:dcol});
    beep(523,0.2,'triangle',0.07); beep(784,0.3,'triangle',0.06); beep(1046,0.45,'triangle',0.05);
    exit={x:bx,y:by,r:26,pulse:0}; exitOpen=true;
    boss=null; bossBullets=[]; state.shake=24; state.devourDim=1;
    if(isTeamOnline() && isHost()) sendTeamEvent('bossDown',{x:bx/W,y:by/H});
    showFragment(k==='shard' ? STORY.boss2Down : (k==='chorus' ? STORY.boss4Down : (k==='devour' ? STORY.boss3Down : STORY.bossDown)));
    if(k==='devour' && state.level>=20){
      setTimeout(finale, 1200);
      updateHUD();
      return;
    }
    updateHUD();
  }

  function updateBoss(dt){
    if(boss.kind==='shard'){ updateBossMend2(dt); return; }
    if(boss.kind==='chorus'){ updateBossDenoise(dt); return; }
    if(boss.kind==='devour'){ updateBossDevour(dt); return; }
    const b=boss;
    if(b.invuln>0) b.invuln-=dt;
    if(b.exposed>0) b.exposed-=dt;
    b.ang+=dt*0.7;
    b.ang2-=dt*1.05;
    const aim=Math.atan2(player.y-b.y,player.x-b.x);
    let dla=((aim-b.lookA+Math.PI*3)%(Math.PI*2))-Math.PI;
    b.lookA+=dla*Math.min(1,dt*4);
    const vuln = (b.st==='idle' || b.st==='expose');
    b.open = (vuln && b.invuln<=0) ? 1 : 0;
    b.eye += ((b.open?1:0)-b.eye)*Math.min(1,dt*6);
    b.pupil += ((b.open?1:0.25)-b.pupil)*Math.min(1,dt*5);
    if(b.block>0) b.block-=dt;
    if(b.open){
      for(const p of pulses){
        const d=Math.hypot(b.x-p.x,b.y-p.y);
        if(Math.abs(d-p.r)<b.r){
          b.hits++; b.invuln=0.5; state.shake=14;
          b.phase = b.hits < b.need*0.4 ? 1 : (b.hits < b.need*0.75 ? 2 : 3);
          beep(220,0.2,'square',0.07); beep(110,0.3,'sawtooth',0.05);
          for(let i=0;i<24;i++) particles.push({x:b.x,y:b.y,vx:rand(-5,5),vy:rand(-5,5),life:1,col:'255,180,80'});
          updateHUD();
          if(b.hits>=b.need){ bossDefeated(); return; }
          break;
        }
      }
    } else {
      for(const p of pulses){
        if(p.blocked) continue;
        const d=Math.hypot(b.x-p.x,b.y-p.y);
        if(Math.abs(d-p.r)<b.r){ p.blocked=1; b.block=0.28; beep(300,0.08,'square',0.04); }
      }
    }
    b.t-=dt;
    if(b.st==='idle'){
      b.x += (W*0.5-b.x)*0.6*dt; b.y += (H*0.38-b.y)*0.6*dt;
      if(b.t<=0){
        const r=Math.random();
        if(r<0.3){ b.st='beam'; b.t=0.7; b.tele=1; b.beamActive=0; b.beamA=Math.atan2(player.y-b.y,player.x-b.x); b.beamA2=b.beamA+Math.PI; }
        else if(r<0.55){ b.st='summon'; b.t=0.55; b.tele=1; }
        else if(r<0.78){ b.st='burst'; b.t=0.6; b.tele=1; b.bcount=0; b.fireTimer=0; }
        else { b.st='charge'; b.t=0.7; b.tele=1; b.cx=player.x; b.cy=player.y; }
      }
    } else if(b.st==='beam'){
      if(b.tele){
        if(b.t<=0){ b.tele=0; b.t=1.5; b.beamActive=1; }
      } else {
        const dir = b.phase>=2?1.35:1;
        b.beamA += dt*1.2*dir; b.beamA2 += dt*1.2*dir;
        const checkBeam=(a)=>{
          const aToP=Math.atan2(player.y-b.y,player.x-b.x);
          const dd=Math.abs(((aToP-a+Math.PI*3)%(Math.PI*2))-Math.PI);
          const pd=Math.hypot(player.x-b.x,player.y-b.y);
          if(dd<0.16 && pd>b.r && losClear(b.x,b.y,player.x,player.y)) loseLife();
        };
        checkBeam(b.beamA);
        if(b.phase>=3) checkBeam(b.beamA2);
        if(b.t<=0){ b.beamActive=0; b.st='expose'; b.exposed= b.phase>=2?1.3:1.7; }
      }
    } else if(b.st==='summon'){
      if(b.t<=0){
        const n=2+b.phase;
        for(let i=0;i<n;i++){ const a=Math.random()*6.2832; shadows.push({x:b.x+Math.cos(a)*60,y:b.y+Math.sin(a)*60,vx:0,vy:0,light:0,r:11,wob:rand(0,6.28)}); }
        beep(180,0.3,'sawtooth',0.06);
        b.st='expose'; b.exposed=1.4;
      }
    } else if(b.st==='burst'){
      if(b.tele){
        if(b.t<=0){ b.tele=0; b.bcount=0; b.fireTimer=0; }
      } else {
        if(b.bcount<(2+b.phase)){
          b.fireTimer-=dt;
          if(b.fireTimer<=0){
            b.fireTimer=0.5;
            const count=8+b.phase*4;
            const off=b.bcount*0.4 + b.lookA;
            const sp=150+b.phase*35;
            for(let i=0;i<count;i++){
              const a=off + i/count*6.2832;
              bossBullets.push({x:b.x+Math.cos(a)*b.r,y:b.y+Math.sin(a)*b.r,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:6,life:5});
            }
            beep(260,0.12,'square',0.05);
            b.bcount++;
          }
        } else {
          b.st='expose'; b.exposed=1.5;
        }
      }
    } else if(b.st==='charge'){
      if(b.tele){
        if(b.t<=0){ b.tele=0; b.t=0.5; const a=Math.atan2(b.cy-b.y,b.cx-b.x); b.vx=Math.cos(a)*840; b.vy=Math.sin(a)*840; }
      } else {
        moveWithCollision(b, b.x+b.vx*dt, b.y+b.vy*dt);
        const pd=Math.hypot(player.x-b.x,player.y-b.y);
        if(pd<b.r+player.r) loseLife();
        if(b.t<=0 || b.x<54||b.x>W-54||b.y<54||b.y>H-54){ b.vx=0; b.vy=0; b.st='expose'; b.exposed=1.9; }
      }
    } else if(b.st==='expose'){
      if(b.exposed<=0){ b.st='idle'; b.t=Math.max(0.4, 0.8-b.phase*0.14); }
    }
  }

  function drawBoss(){
    if(boss.kind==='shard'){ drawBossMend2(); return; }
    if(boss.kind==='chorus'){ drawBossDenoise(); return; }
    if(boss.kind==='devour'){ drawBossDevour(); return; }
    const b=boss;
    const vis=0.12+0.55*b.eye;
    const now=performance.now();
    const pc = b.phase>=3 ? '255,70,90' : b.phase>=2 ? '255,120,80' : '200,90,150';
    const pcD = b.phase>=3 ? '150,20,40' : b.phase>=2 ? '150,55,25' : '90,25,70';
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*3);
    g.addColorStop(0,'rgba('+pcD+',0.5)');
    g.addColorStop(0.5,'rgba('+pc+','+(0.22*vis+0.05)+')');
    g.addColorStop(1,'rgba('+pcD+',0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*3,0,6.2832); ctx.fill();
    // 外层尖刺旋转环
    const spikes=12;
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.ang);
    ctx.strokeStyle='rgba('+pc+','+(0.55+0.4*vis)+')'; ctx.lineWidth=2;
    ctx.fillStyle='rgba('+pcD+','+(0.35+0.3*vis)+')';
    ctx.beginPath();
    for(let i=0;i<spikes;i++){
      const a0=i/spikes*6.2832, a1=(i+0.5)/spikes*6.2832;
      const ro=b.r*1.55+(b.st==='charge'?6:0), ri=b.r*1.2;
      if(i===0) ctx.moveTo(Math.cos(a0)*ri,Math.sin(a0)*ri); else ctx.lineTo(Math.cos(a0)*ri,Math.sin(a0)*ri);
      ctx.lineTo(Math.cos(a1)*ro,Math.sin(a1)*ro);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
    // 中层反向旋转分段环
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.ang2);
    const seg=6;
    ctx.strokeStyle='rgba('+pc+','+(0.5+0.45*vis)+')'; ctx.lineWidth=3.5;
    for(let i=0;i<seg;i++){
      const a0=i/seg*6.2832+0.12, a1=(i+1)/seg*6.2832-0.12;
      ctx.beginPath(); ctx.arc(0,0,b.r*1.05,a0,a1); ctx.stroke();
    }
    ctx.restore();
    // 轨道卫星节点
    const sats=b.phase+2;
    for(let i=0;i<sats;i++){
      const a=b.ang2*-1.4 + i/sats*6.2832;
      const sx=b.x+Math.cos(a)*b.r*1.35, sy=b.y+Math.sin(a)*b.r*1.35;
      const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,12);
      sg.addColorStop(0,'rgba('+pc+',0.95)'); sg.addColorStop(1,'rgba('+pc+',0)');
      ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,12,0,6.2832); ctx.fill();
      ctx.fillStyle='rgba(255,235,220,0.9)'; ctx.beginPath(); ctx.arc(sx,sy,3,0,6.2832); ctx.fill();
    }
    // 主体外壳
    ctx.strokeStyle='rgba('+pc+','+(0.4+0.5*vis)+')'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.2832); ctx.stroke();
    const shell=ctx.createRadialGradient(b.x,b.y,b.r*0.3,b.x,b.y,b.r);
    shell.addColorStop(0,'rgba('+pcD+',0.2)');
    shell.addColorStop(1,'rgba('+pcD+',0.55)');
    ctx.fillStyle=shell; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.2832); ctx.fill();
    // 眼睛/虹膜
    const core=b.open?1:0.2;
    const irisR=b.r*0.62;
    const cg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,irisR);
    if(b.open){ cg.addColorStop(0,'rgba(255,240,170,'+core+')'); cg.addColorStop(0.55,'rgba(255,180,80,'+(core*0.7)+')'); cg.addColorStop(1,'rgba(255,120,60,0)'); }
    else { cg.addColorStop(0,'rgba('+pc+','+core+')'); cg.addColorStop(1,'rgba('+pc+',0)'); }
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(b.x,b.y,irisR,0,6.2832); ctx.fill();
    // 瞳孔（追踪玩家）
    const look=0.35*b.pupil;
    const px=b.x+Math.cos(b.lookA)*irisR*look, py=b.y+Math.sin(b.lookA)*irisR*look;
    const pr=irisR*(0.28+0.18*b.pupil);
    ctx.fillStyle='rgba(10,2,8,'+(0.55+0.4*b.eye)+')'; ctx.beginPath(); ctx.arc(px,py,pr,0,6.2832); ctx.fill();
    if(b.open){
      ctx.fillStyle='rgba(255,250,220,'+core+')'; ctx.beginPath(); ctx.arc(px,py,pr*0.4,0,6.2832); ctx.fill();
      ctx.strokeStyle='rgba(255,240,170,0.85)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(b.x,b.y,b.r+8,0,6.2832); ctx.stroke();
    } else {
      ctx.fillStyle='rgba(255,255,255,'+(0.5*b.pupil+0.2)+')'; ctx.beginPath(); ctx.arc(px-pr*0.3,py-pr*0.3,pr*0.22,0,6.2832); ctx.fill();
    }
    if(b.block>0){ ctx.strokeStyle='rgba(255,70,70,'+(b.block/0.28*0.8)+')'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(b.x,b.y,b.r+6,0,6.2832); ctx.stroke(); }
    if(b.st==='charge'&&b.tele){
      const a=Math.atan2(b.cy-b.y,b.cx-b.x);
      ctx.strokeStyle='rgba(255,60,60,'+(0.45+0.35*Math.sin(now/60))+')'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x+Math.cos(a)*Math.max(W,H),b.y+Math.sin(a)*Math.max(W,H)); ctx.stroke();
    }
    if(b.st==='burst'&&b.tele){
      ctx.strokeStyle='rgba(255,120,90,'+(0.3+0.3*Math.sin(now/50))+')'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r*1.8,0,6.2832); ctx.stroke();
    }
    if(b.st==='beam'){
      const act=b.beamActive;
      const drawBeam=(a)=>{
        ctx.strokeStyle = act?'rgba(255,80,90,0.85)':'rgba(255,120,120,'+(0.2+0.2*Math.sin(now/50))+')';
        ctx.lineWidth = act?6:3;
        ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x+Math.cos(a)*Math.max(W,H),b.y+Math.sin(a)*Math.max(W,H)); ctx.stroke();
      };
      drawBeam(b.beamA);
      if(b.phase>=3) drawBeam(b.beamA2);
    }
  }

  // ===== 新 Boss（第 15 关）：众声 · 合唱之茧 =====
  const EXPECT_LINES = ['你该更努力','别让大家失望','你怎么还不行','看看别人家','你要懂事','给我争口气','别给我丢脸','你得有出息','这点事都做不好','笑一个，别扫兴','你应该更好','怎么又是你','别人都可以','你让我很失望'];
  // ===== 第 15 关 Boss：众声·降噪（只压「正在发声」的声音，养大你自己的声音）=====
  function denoiseVoicePos(b,v){
    const a=v.a0+b.ang;
    return [b.x+Math.cos(a)*v.rad, b.y+Math.sin(a)*v.rad];
  }
  function buildBossDenoise(lv,pad){
    const bossNum=Math.max(1,Math.floor(lv/5));
    player.x=W*0.5; player.y=H-pad; player.vx=player.vy=0;
    let pt=0; while(!pointClearOfWalls(player.x,player.y,28)&&pt<200){ player.x=rand(pad,W-pad); player.y=rand(H*0.6,H-pad); pt++; }
    orbsTotal=0; orbsGot=0; exit=null; exitOpen=false;
    const cx=W*0.5, cy=H*0.42, vcount=8;
    const rad=Math.min(W,H)*0.3;
    const voices=[];
    for(let i=0;i<vcount;i++){
      voices.push({ a0:i/vcount*6.2832, rad:rad, state:'idle', mouth:0, speakT:0, cooldown:rand(0.3,2.2), fireT:0, line:EXPECT_LINES[i%EXPECT_LINES.length], flash:0, blink:rand(0,6.28) });
    }
    boss={ kind:'chorus', x:cx, y:cy, r:30, num:bossNum, voices:voices, self:0, phase:1, spawnT:1.3, activeMax:1, ang:0, corePulse:0, vcount:vcount, shocks:[], ringT:2.6, shockT:3.0, tier:1 };
    const defs=[{type:'shield',col:'120,230,255',label:'护'},{type:'dash',col:'120,255,180',label:'疾'},{type:'silence',col:'190,140,255',label:'静'}];
    const d=defs[Math.floor(Math.random()*defs.length)];
    items.push({x:W*0.5,y:H*0.84,type:d.type,col:d.col,label:d.label,light:0,phase:0,got:false});
    const d2=defs[Math.floor(Math.random()*defs.length)];
    items.push({x:W*0.22,y:H*0.5,type:d2.type,col:d2.col,label:d2.label,light:0,phase:0,got:false});
  }
  function updateBossDenoise(dt){
    const b=boss;
    b.ang+=dt*0.1;
    b.corePulse+=dt;
    b.phase = b.self<0.2?1:(b.self<0.4?2:(b.self<0.6?3:4));
    b.activeMax = Math.min(3, b.phase);
    if(b.phase>b.tier){ b.tier=b.phase; hintEl.textContent = b.phase===2?'它们开始三连发声了——小心扇形弹幕':(b.phase===3?'更多声音围上来，发声者还会朝四周炸开一圈——别贴太近':'它们合起来了：中央会扩散出带缺口的冲击波，看准缺口穿过去'); }
    let speaking=0;
    for(const v of b.voices){
      if(v.flash>0) v.flash-=dt*2.4;
      v.blink+=dt;
      const pos=denoiseVoicePos(b,v); v.x=pos[0]; v.y=pos[1];
      if(v.state==='speaking'){
        speaking++;
        v.mouth=Math.min(1,v.mouth+dt*4);
        v.speakT-=dt; v.fireT-=dt;
        if(v.fireT<=0){
          const a=Math.atan2(player.y-v.y,player.x-v.x);
          const sp=140+b.phase*22;
          if(b.phase>=2){
            for(let s=-1;s<=1;s++){ const aa=a+s*0.2; bossBullets.push({x:v.x,y:v.y,vx:Math.cos(aa)*sp,vy:Math.sin(aa)*sp,r:6,life:6}); }
          } else {
            bossBullets.push({x:v.x,y:v.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:6,life:6});
          }
          beep(170+Math.random()*50,0.09,'square',0.035);
          v.fireT = b.phase>=2 ? 0.72 : 0.6;
        }
        let silenced=false;
        for(const p of pulses){
          if(p.blocked) continue;
          const d=Math.hypot(v.x-p.x,v.y-p.y);
          if(Math.abs(d-p.r)<32){ silenced=true; break; }
        }
        if(silenced){
          v.state='silenced'; v.flash=1; v.cooldown=rand(1.2,2.0); v.mouth=0; speaking--; b.self=Math.min(1,b.self+0.07);
          beep(640,0.16,'sine',0.05); beep(920,0.16,'sine',0.04);
          for(let i=0;i<12;i++) particles.push({x:v.x,y:v.y,vx:rand(-3,3),vy:rand(-3,3),life:0.9,col:'160,210,255'});
        } else if(v.speakT<=0){
          v.state='idle'; v.cooldown=rand(0.5,1.1); v.mouth=0;
        }
      } else {
        v.mouth=Math.max(0,v.mouth-dt*3);
        if(v.cooldown>0) v.cooldown-=dt;
        else if(v.state==='silenced'){ v.state='idle'; }
      }
    }
    b.spawnT-=dt;
    if(b.spawnT<=0 && speaking<b.activeMax){
      const cand=b.voices.filter(function(v){ return v.state==='idle' && v.cooldown<=0; });
      if(cand.length){
        const v=cand[Math.floor(Math.random()*cand.length)];
        v.state='speaking'; v.speakT=Math.max(1.6,2.9-b.phase*0.3); v.fireT=0.35; v.mouth=0;
        v.line=EXPECT_LINES[Math.floor(Math.random()*EXPECT_LINES.length)];
        beep(120,0.18,'sawtooth',0.04);
      }
      b.spawnT=Math.max(0.35,1.0-b.phase*0.22)+Math.random()*0.4;
    }
    if(b.phase>=3 && speaking>0){
      b.ringT-=dt;
      if(b.ringT<=0){
        const spk=b.voices.filter(function(v){ return v.state==='speaking'; });
        const v=spk[Math.floor(Math.random()*spk.length)];
        const cnt=10+(b.phase-3)*4, rsp=130;
        const off=Math.random()*6.2832;
        for(let i=0;i<cnt;i++){ const a=off+i/cnt*6.2832; bossBullets.push({x:v.x,y:v.y,vx:Math.cos(a)*rsp,vy:Math.sin(a)*rsp,r:6,life:5}); }
        beep(300,0.14,'square',0.05);
        b.ringT=Math.max(1.4, 2.6-(b.phase-3)*0.6);
      }
    }
    if(b.phase>=4){

    updateHUD();
  }

  function chorusVoicePos(b,v){
    const a=b.ang+v.a0;
    return { x:b.x+Math.cos(a)*v.rad, y:b.y+Math.sin(a)*v.rad, a:a };
  }

  function updateBossChorus(dt){
    const b=boss;
    if(b.invuln>0) b.invuln-=dt;
    b.ang += dt*(0.18+0.06*b.phase);
    b.phase = b.hits < b.need*0.4 ? 1 : (b.hits < b.need*0.75 ? 2 : 3);
    const regrow = 5.5 - b.phase*0.9;
    const swellGap = 5.0 - b.phase*0.7;
    const fireGap = 2.4 - b.phase*0.45;
    if(b.swelling>0){
      b.swellDur-=dt;
      if(b.swellDur<=0){ b.swelling=0; b.swellT=swellGap; }
    } else {
      b.swellT-=dt;
      if(b.swellT<=0){
        b.swelling=1; b.swellDur=1.1; b.shock=1;
        beep(140,0.4,'sawtooth',0.06); beep(180,0.35,'square',0.05);
        const count=10+b.phase*3, sp=140+b.phase*30;
        for(let i=0;i<count;i++){ const a=i/count*6.2832 + b.ang; bossBullets.push({x:b.x+Math.cos(a)*b.r,y:b.y+Math.sin(a)*b.r,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:6,life:5}); }
      }
    }
    if(b.shock>0) b.shock-=dt*1.6;
    for(const v of b.voices){
      v.blink+=dt*3;
      if(v.broken){
        v.brokenT-=dt;
        v.mouth += (0-v.mouth)*Math.min(1,dt*8);
        if(v.brokenT<=0){ v.broken=0; v.line=EXPECT_LINES[Math.floor(Math.random()*EXPECT_LINES.length)]; }
        continue;
      }
      let target;
      if(b.swelling){ target=1; }
      else { const wave=Math.sin(b.ang*2 + v.a0*2.5); target = wave>0.35 ? 1 : 0.08; }
      v.mouth += (target-v.mouth)*Math.min(1,dt*7);
      const pos=chorusVoicePos(b,v);
      if(!b.swelling && v.mouth>0.6){
        v.fireT-=dt;
        if(v.fireT<=0){
          v.fireT=fireGap*rand(0.8,1.3);
          const aim=Math.atan2(player.y-pos.y,player.x-pos.x);
          const sp=120+b.phase*28;
          bossBullets.push({x:pos.x,y:pos.y,vx:Math.cos(aim)*sp,vy:Math.sin(aim)*sp,r:6,life:6});
        }
      }
      if(dist2(pos.x,pos.y,player.x,player.y) < (16+player.r)*(16+player.r)) loseLife();
    }
    for(const p of pulses){
      if(p.blocked) continue;
      for(const v of b.voices){
        if(v.broken || v.mouth<0.55) continue;
        const pos=chorusVoicePos(b,v);
        const d=Math.hypot(pos.x-p.x,pos.y-p.y);
        if(Math.abs(d-p.r)<16){
          v.broken=1; v.brokenT=regrow; v.mouth=0;
          beep(420,0.1,'square',0.05);
          for(let i=0;i<10;i++) particles.push({x:pos.x,y:pos.y,vx:rand(-4,4),vy:rand(-4,4),life:0.8,col:'180,210,255'});
        }
      }
    }
    const allSilent = b.voices.every(function(v){ return v.broken; });
    if(allSilent && b.coreOpen<=0 && b.openT<=0){
      b.coreOpen=1; b.openT=2.2; state.shake=8;
      beep(660,0.12,'triangle',0.05);
    }
    if(b.openT>0){
      b.openT-=dt;
      if(!allSilent) b.openT=Math.min(b.openT,0.25);
      if(b.openT<=0){ b.coreOpen=0; }
    } else { b.coreOpen=0; }
    if(b.coreOpen>0 && b.invuln<=0){
      for(const p of pulses){
        if(p.blocked) continue;
        const d=Math.hypot(b.x-p.x,b.y-p.y);
        if(Math.abs(d-p.r)<b.r){
          b.hits++; b.invuln=0.5; state.shake=14;
          beep(220,0.2,'square',0.07); beep(110,0.3,'sawtooth',0.05);
          for(let i=0;i<24;i++) particles.push({x:b.x,y:b.y,vx:rand(-5,5),vy:rand(-5,5),life:1,col:'180,210,255'});
          updateHUD();
          if(b.hits>=b.need){ bossDefeated(); return; }
          break;
        }
      }
    }
  }

  function spawnMirrorRound(){
    const b=boss;
    const count = b.mirrorBase + b.round;
    const mpad=84;
    b.mirrors=[];
    // 抖动网格布点：均匀分布、绝不重叠
    const x0=mpad, xMax=W-mpad, y0=mpad, yMax=H*0.72;
    const regW=Math.max(1,xMax-x0), regH=Math.max(1,yMax-y0);
    let cols=Math.max(2, Math.round(Math.sqrt(count*regW/regH)));
    let rows=Math.ceil(count/cols);
    if(cols*rows<count) cols++;
    const cellW=regW/cols, cellH=regH/rows;
    const cells=[];
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) cells.push({c:c,r:r});
    for(let i=cells.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const tmp=cells[i]; cells[i]=cells[j]; cells[j]=tmp; }
    const trueIdx = Math.floor(Math.random()*count);
    for(let i=0;i<count;i++){
      const cell=cells[i];
      const jxr=(cellW>120)?(cellW/2-52):cellW*0.2, jyr=(cellH>150)?(cellH/2-66):cellH*0.16;
      let mx=x0+(cell.c+0.5)*cellW + rand(-jxr,jxr);
      let my=y0+(cell.r+0.5)*cellH + rand(-jyr,jyr);
      mx=Math.max(mpad,Math.min(W-mpad,mx)); my=Math.max(mpad,Math.min(H*0.72,my));
      const isTrue=(i===trueIdx);
      const hifi = !isTrue && b.round>=1 && Math.random()<0.45;
      // 裂纹（每面镜子固定一套，避免闪烁）
      const cracks=[]; const ccx=rand(-6,6), ccy=rand(-12,10); const cn=3+Math.floor(Math.random()*3);
      for(let k=0;k<cn;k++){
        const a=rand(0,6.2832), len=rand(16,44);
        let ex=Math.max(-18,Math.min(18,ccx+Math.cos(a)*len)), ey=Math.max(-43,Math.min(43,ccy+Math.sin(a)*len));
        cracks.push({x1:ccx,y1:ccy,x2:ex,y2:ey});
        if(Math.random()<0.65){ const t=rand(0.4,0.7), mxp=ccx+(ex-ccx)*t, myp=ccy+(ey-ccy)*t, ba=a+rand(-1.1,1.1), bl=rand(7,18); cracks.push({x1:mxp,y1:myp,x2:Math.max(-18,Math.min(18,mxp+Math.cos(ba)*bl)),y2:Math.max(-43,Math.min(43,myp+Math.sin(ba)*bl))}); }
      }
      b.mirrors.push({ x:mx, y:my, r:27, fake:!isTrue, hifi:hifi, light:0, phase:rand(0,6.28), shimmer:rand(0,6.28), jit:rand(0,6.28), cracks:cracks, ccx:ccx, ccy:ccy, whisper: isTrue?TRUE_LINES[Math.floor(Math.random()*TRUE_LINES.length)]:LIE_LINES[Math.floor(Math.random()*LIE_LINES.length)] });
    }
    b.hintT=0;
  }

  function updateBossShard(dt){
    const b=boss;
    if(b.invuln>0) b.invuln-=dt;

    if(b.phase===1){
      if(b.hintT>0) b.hintT-=dt;
      for(const m of b.mirrors){
        for(const p of pulses){ const d=Math.hypot(m.x-p.x,m.y-p.y); if(Math.abs(d-p.r)<48){ m.light=1; } }
        const pd=Math.hypot(m.x-player.x,m.y-player.y);
        if(pd<130) m.light=Math.max(m.light, 1-pd/130);
        m.light=Math.max(0, m.light - dt*0.8);
        m.phase+=dt*2.2; m.shimmer+=dt*3; m.jit+=dt*9;
      }
      for(const m of b.mirrors){
        if(Math.hypot(m.x-player.x,m.y-player.y) < m.r+player.r){
          if(!m.fake){
            b.round++;
            state.shake=14;
            beep(660,0.18,'triangle',0.06); beep(990,0.2,'triangle',0.05);
            for(let k=0;k<26;k++) particles.push({x:m.x,y:m.y,vx:rand(-6,6),vy:rand(-6,6),life:1.2,col:selectedChar.col});
            if(b.round>=b.roundsNeed){ shardEnterPhase2(); }
            else { showFragment(ROUND_HINTS[b.round]||'又一面碎了。'); spawnMirrorRound(); }
            updateHUD();
          } else if(state.invuln<=0){
            loseLife();
            state.shake=16;
            for(let k=0;k<16;k++) particles.push({x:m.x,y:m.y,vx:rand(-5,5),vy:rand(-5,5),life:1,col:'255,90,120'});
            spawnMirrorRound();
            b.hintT=1.3;
          }
          return;
        }
      }
      return;
    }

    b.appearT+=dt;
    b.eye += (1-b.eye)*Math.min(1,dt*2);
    const aim=Math.atan2(player.y-b.y,player.x-b.x);
    b.lookA += (((aim-b.lookA+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*3);

    if(b.flinch){
      b.flinch=0;
      if(b.gaze>0.05){ b.gaze=0; state.shake=10; beep(160,0.2,'sawtooth',0.05); shardBurst(b.x,b.y, 10, 200); showFragment('你又移开了眼。'); }
    }

    const pd=Math.hypot(player.x-b.x,player.y-b.y);
    const speed=Math.hypot(player.vx,player.vy);
    const inGaze = pd < 360 && pd > b.r+player.r+8;
    const still = speed < 30;
    if(inGaze && still && b.invuln<=0){
      b.gaze += dt;
      if(b.gaze>=b.gazeNeed){
        b.gaze=0; b.hits++; b.invuln=0.9; state.shake=20; state.flashT=Math.max(state.flashT||0,0.6);
        b.x -= Math.cos(b.lookA)*60; b.y -= Math.sin(b.lookA)*60;
        beep(523,0.25,'triangle',0.07); beep(880,0.3,'triangle',0.05);
        for(let k=0;k<44;k++) particles.push({x:b.x,y:b.y,vx:rand(-9,9),vy:rand(-9,9),life:1.5,col:'255,240,205'});
        if(b.hits-1 < GAZE_LINES.length) showFragment(GAZE_LINES[b.hits-1]);
        updateHUD();
        if(b.hits>=b.need){ bossDefeated(); return; }
      }
    }

    b.t-=dt; b.fireTimer-=dt;
    if(b.st==='idle'){
      if(b.fireTimer<=0){
        if(Math.random()<0.5){ b.st='beam'; b.t=0.9; b.tele=1; b.beamA=aim; }
        else { b.st='spit'; b.t=0.7; b.tele=1; }
        b.fireTimer=999;
      }
    } else if(b.st==='beam'){
      if(b.tele){ if(b.t<=0){ b.tele=0; b.t=1.4; b.beamActive=1; } }
      else {
        b.beamA += dt*0.85;
        const dd=Math.abs(((aim-b.beamA+Math.PI*3)%(Math.PI*2))-Math.PI);
        if(dd<0.16 && pd>b.r && state.invuln<=0) loseLife();
        if(b.t<=0){ b.beamActive=0; b.st='idle'; b.fireTimer=rand(2.4,3.4); }
      }
    } else if(b.st==='spit'){
      if(b.tele && b.t<=0){ b.tele=0; shardBurstAimed(b.x,b.y, 7, 210, aim); shardBurst(b.x,b.y, 9, 150); beep(240,0.12,'square',0.04); b.st='idle'; b.fireTimer=rand(2.6,3.6); }
    }

    b.x += Math.cos(b.lookA)*20*dt; b.y += Math.sin(b.lookA)*20*dt;
    b.x=Math.max(64,Math.min(W-64,b.x)); b.y=Math.max(64,Math.min(H-64,b.y));
    if(pd < b.r+player.r && state.invuln<=0){ loseLife(); }
  }

        ctx.restore();

          else { ctx.fillStyle='rgba(180,255,220,'+(0.55+0.4*Math.min(1,lit))+')'; ctx.font='600 12.5px sans-serif'; }
          ctx.textAlign='center'; ctx.fillText(m.whisper, m.x, m.y+h+20);
        }
        if(m.fake && revealFake){ ctx.strokeStyle='rgba(255,80,90,0.95)'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(m.x-13,m.y-13); ctx.lineTo(m.x+13,m.y+13); ctx.moveTo(m.x+13,m.y-13); ctx.lineTo(m.x-13,m.y+13); ctx.stroke(); }

    const ex=b.x, ey=b.y, ap=b.eye;

    og.addColorStop(0,'rgba(120,150,210,'+(0.34*ap)+')'); og.addColorStop(0.55,'rgba(90,80,150,'+(0.12*ap)+')'); og.addColorStop(1,'rgba(90,80,150,0)');

    ctx.restore();
    if(b.st==='beam'){

    }
  }

  function buildBossMend(lv,pad){

  function updateBossMend(dt){
    const b=boss;

    b.ang+=dt*0.5;

    const aim=Math.atan2(player.y-b.y,player.x-b.x);
    b.lookA += (((aim-b.lookA+Math.PI*3)%(Math.PI*2))-Math.PI)*Math.min(1,dt*3);
    if(state.lives < b._lastLives && b.placed>0){
      const ps=b.shards.filter(function(s){ return s.state==='placed'; });
      if(ps.length){ const sh=ps[Math.floor(Math.random()*ps.length)]; sh.state='field'; b.slots[sh.slot].filled=0; b.placed=Math.max(0,b.placed-1); let sx,sy,c=0; do{ sx=rand(70,W-70); sy=rand(70,H*0.82); c++; }while((!pointClearOfWalls(sx,sy,26)||dist2(sx,sy,player.x,player.y)<120*120)&&c<160); sh.x=sx; sh.y=sy; sh.light=1; b.hitFlash=1; state.shake=Math.max(state.shake,14); beep(200,0.22,'sawtooth',0.05); for(let i=0;i<16;i++) particles.push({x:b.x,y:b.y,vx:rand(-6,6),vy:rand(-6,6),life:1,col:'255,120,140'}); showFragment('你又碎了一块——没关系，再捡回来。'); updateHUD(); }
    }
    b._lastLives=state.lives;
    for(const s of b.shards){
      if(s.state==='field'){
        s.phase+=dt*2.4; s.rot+=dt*0.6;
        for(const p of pulses){ const d=Math.hypot(s.x-p.x,s.y-p.y); if(Math.abs(d-p.r)<40) s.light=1; }
        const pd=Math.hypot(s.x-player.x,s.y-player.y);

        if(pd<player.r+22){ s.state='fly'; beep(740,0.12,'sine',0.05); beep(1050,0.14,'sine',0.04); for(let i=0;i<10;i++) particles.push({x:s.x,y:s.y,vx:rand(-3,3),vy:rand(-3,3),life:0.8,col:selectedChar.col}); }
      } else if(s.state==='fly'){
        const sl=b.slots[s.slot], dx=sl.x-s.x, dy=sl.y-s.y, d=Math.hypot(dx,dy)||1, step=Math.min(d,(560+d*3.2)*dt);
        s.x+=dx/d*step; s.y+=dy/d*step; s.light=1;
        if(d<10){ s.state='placed'; s.x=sl.x; s.y=sl.y; sl.filled=1; b.placed++; beep(560,0.16,'triangle',0.05); beep(840,0.18,'triangle',0.04); for(let i=0;i<14;i++) particles.push({x:sl.x,y:sl.y,vx:rand(-3,3),vy:rand(-3,3),life:1,col:'255,228,160'}); if(Math.random()<0.7) showFragment(s.line); updateHUD(); if(b.placed>=b.need){ bossDefeated(); return; } }
      }
    }
    b.t-=dt;
    if(b.st==='idle'){
      b.x += (b.cx-b.x)*0.5*dt; b.y += (b.cy-b.y)*0.5*dt;
      if(b.t<=0){ const r=Math.random(); if(r<0.4){ b.st='beam'; b.t=0.8; b.tele=1; b.beamActive=0; b.beamA=aim; } else if(r<0.78){ b.st='spit'; b.t=0.6; b.tele=1; } else { b.st='charge'; b.t=0.7; b.tele=1; b.cxT=player.x; b.cyT=player.y; } }

    } else if(b.st==='spit'){
      if(b.tele && b.t<=0){ b.tele=0; const count=8+b.phase*3, sp=150+b.phase*28, off=b.lookA; for(let i=0;i<count;i++){ const a=off+i/count*6.2832; bossBullets.push({x:b.x+Math.cos(a)*b.r,y:b.y+Math.sin(a)*b.r,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:6,life:5}); } const cn=3+b.phase; for(let i=0;i<cn;i++){ const a=aim-0.5+1.0*(cn>1?i/(cn-1):0.5); bossBullets.push({x:b.x+Math.cos(a)*b.r,y:b.y+Math.sin(a)*b.r,vx:Math.cos(a)*(sp+40),vy:Math.sin(a)*(sp+40),r:6,life:5}); } beep(260,0.12,'square',0.05); b.st='idle'; b.t=Math.max(0.5,1.0-b.phase*0.15); }
    } else if(b.st==='charge'){
      if(b.tele){ if(b.t<=0){ b.tele=0; b.t=0.5; const a=Math.atan2(b.cyT-b.y,b.cxT-b.x); b.vx=Math.cos(a)*760; b.vy=Math.sin(a)*760; } }
      else { moveWithCollision(b,b.x+b.vx*dt,b.y+b.vy*dt); if(Math.hypot(player.x-b.x,player.y-b.y)<b.r+player.r) loseLife(); if(b.t<=0||b.x<60||b.x>W-60||b.y<60||b.y>H-60){ b.vx=0; b.vy=0; b.st='idle'; b.t=0.8; } }
    }
    if(b.st!=='charge' && Math.hypot(player.x-b.x,player.y-b.y)<b.r*0.7+player.r) loseLife();
  }
  function drawMendShard(x,y,a,col,s){

    if(b.st==='beam'){ const len=Math.max(W,H); if(b.tele){ ctx.strokeStyle='rgba(255,150,120,'+(0.3+0.3*Math.abs(Math.sin(now/60)))+')'; ctx.lineWidth=2; } else { ctx.strokeStyle='rgba(255,120,120,0.85)'; ctx.lineWidth=b.beamActive?7:2; } ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x+Math.cos(b.beamA)*len,b.y+Math.sin(b.beamA)*len); ctx.stroke(); }
    if(b.st==='spit'&&b.tele){ ctx.strokeStyle='rgba(255,150,90,'+(0.3+0.3*Math.sin(now/55))+')'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*1.7,0,6.2832); ctx.stroke(); }
    if((b.st==='charge'||b.st==='smash')&&b.tele){ const a=Math.atan2(b.cyT-b.y,b.cxT-b.x); ctx.strokeStyle='rgba(255,90,90,'+(0.4+0.35*Math.sin(now/60))+')'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x+Math.cos(a)*Math.max(W,H),b.y+Math.sin(a)*Math.max(W,H)); ctx.stroke(); }
    for(const s of b.shards){ if(s.state==='placed'){ drawMendShard(s.x,s.y,1,'255,228,160',s); } else if(s.state==='fly'){ const sl=b.slots[s.slot]; ctx.strokeStyle='rgba(255,235,190,0.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(sl.x,sl.y); ctx.stroke(); drawMendShard(s.x,s.y,1,'255,235,190',s); } else { const a=s.light; if(a<=0.03) continue; const rr=18+Math.sin(now/240+s.phase)*4; ctx.strokeStyle='rgba('+selectedChar.col+','+(a*0.5)+')'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(s.x,s.y+Math.sin(s.phase)*2,rr,0,6.2832); ctx.stroke(); drawMendShard(s.x,s.y,a,selectedChar.col,s); if(a>0.45){ ctx.globalAlpha=Math.min(1,(a-0.45)*1.6); ctx.fillStyle='rgba(190,255,225,0.95)'; ctx.font='600 12px sans-serif'; ctx.textAlign='center'; ctx.fillText(s.line,s.x,s.y+30); ctx.globalAlpha=1; } } }
    const hb=b.r*0.66;
    const hg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,hb+12);
    hg.addColorStop(0,'rgba('+(b.hitFlash>0?'160,60,90':'44,30,66')+',0.9)'); hg.addColorStop(1,'rgba(34,22,54,0)');
    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(b.x,b.y,hb+12,0,6.2832); ctx.fill();
    ctx.fillStyle='rgba('+(b.hitFlash>0?'120,40,64':'26,18,44')+',0.95)'; ctx.beginPath(); ctx.arc(b.x,b.y,hb,0,6.2832); ctx.fill();
    ctx.strokeStyle='rgba(150,120,200,0.5)'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(b.x,b.y,hb,0,6.2832); ctx.stroke();

    }

  // ===== 第三个 Boss：噬光者（正面挡光 · 打背后核心）=====
  function buildBossDevour(lv,pad){
    const bossNum=Math.max(1,Math.floor(lv/5));
    for(let i=0;i<4;i++){ const px=W*(i<2?0.26:0.74), py=H*(i%2===0?0.3:0.7); walls.push({x:px-30,y:py-30,w:60,h:60}); }
    player.x=W*0.5; player.y=H-pad; player.vx=player.vy=0;
    let pt=0; while(!pointClearOfWalls(player.x,player.y,28)&&pt<200){ player.x=rand(pad,W-pad); player.y=rand(H*0.6,H-pad); pt++; }
    orbsTotal=0; orbsGot=0; exit=null; exitOpen=false;
    state.devourDim=1;
    wells=[{x:W*0.28,y:H*0.5,r:34,t:rand(0,6.28),on:0},{x:W*0.72,y:H*0.5,r:34,t:rand(0,6.28),on:0},{x:W*0.5,y:H*0.74,r:34,t:rand(0,6.28),on:0}];
    boss={ kind:'devour', x:W*0.5, y:H*0.36, r:46, need:8+Math.max(0,(bossNum-3))*2, hits:0, phase:1, invuln:0.8, faceA:Math.atan2(player.y-H*0.36,player.x-W*0.5), vuln:0, st:'idle', t:1.6, tele:0, vx:0, vy:0, cx:0, cy:0, mouth:0, coreX:0, coreY:0, num:bossNum };
    const defs=[{type:'shield',col:'120,230,255',label:'护'},{type:'dash',col:'120,255,180',label:'疾'},{type:'silence',col:'190,140,255',label:'静'}];
    const def=defs[Math.floor(Math.random()*defs.length)];
    items.push({x:W*0.5,y:H*0.7,type:def.type,col:def.col,label:def.label,light:0,phase:0,got:false});
    const def2=defs[Math.floor(Math.random()*defs.length)];
    items.push({x:W*0.26,y:H*0.5,type:def2.type,col:def2.col,label:def2.label,light:0,phase:0,got:false});
  }

  function updateBossDevour(dt){
    const b=boss;
    if(b.invuln>0) b.invuln-=dt;
    if(b.vuln>0) b.vuln-=dt;
    b.mouth += (((b.st==='breath'&&!b.tele)?1:0)-b.mouth)*Math.min(1,dt*6);
    const aim=Math.atan2(player.y-b.y,player.x-b.x);
    if(b.vuln<=0){
      const turn=(1.3+(b.phase-1)*0.5)*dt;
      let da=((aim-b.faceA+Math.PI*3)%(Math.PI*2))-Math.PI;
      b.faceA += Math.max(-turn,Math.min(turn,da));
    }
    const pd0=Math.hypot(player.x-b.x,player.y-b.y);
    let dim=1-Math.max(0,1-pd0/360)*0.45;
    if(b.st==='breath'&&!b.tele) dim*=0.6;
    state.devourDim=dim;
    const backA=b.faceA+Math.PI;
    b.coreX=b.x+Math.cos(backA)*b.r*0.78; b.coreY=b.y+Math.sin(backA)*b.r*0.78;
    const behind=Math.cos(Math.atan2(player.y-b.y,player.x-b.x)-backA)>0.2;
    if(b.vuln>0 && b.invuln<=0){
      for(const p of pulses){
        const d=Math.hypot(b.coreX-p.x,b.coreY-p.y);
        if(behind && Math.abs(d-p.r)<22){
          b.hits++; b.invuln=0.45; state.shake=14;
          b.phase = b.hits<b.need*0.4?1:(b.hits<b.need*0.75?2:3);
          beep(220,0.2,'square',0.07); beep(140,0.3,'sawtooth',0.05);
          for(let i=0;i<22;i++) particles.push({x:b.coreX,y:b.coreY,vx:rand(-5,5),vy:rand(-5,5),life:1,col:'200,170,255'});
          updateHUD();
          if(b.hits>=b.need){ bossDefeated(); return; }
          break;
        }
      }
    } else {
      for(const p of pulses){ if(p.blocked) continue; const d=Math.hypot(b.x-p.x,b.y-p.y); if(Math.abs(d-p.r)<b.r){ p.blocked=1; beep(300,0.07,'square',0.03); } }
    }
    if(pd0<b.r*0.7+player.r) loseLife();
    b.t-=dt;
    if(b.st==='idle'){
      b.x += (W*0.5-b.x)*0.4*dt; b.y += (H*0.4-b.y)*0.4*dt;
      if(b.t<=0 && b.vuln<=0){
        const r=Math.random();
        if(r<0.45){ b.st='breath'; b.t=0.6; b.tele=1; }
        else if(r<0.78){ b.st='charge'; b.t=0.6; b.tele=1; b.cx=player.x; b.cy=player.y; }
        else { b.st='spit'; b.t=0.5; b.tele=1; }
      }
    } else if(b.st==='breath'){
      if(b.tele){ if(b.t<=0){ b.tele=0; b.t=1.4; b.vuln=1.45; } }
      else {
        const dd=Math.abs(((aim-b.faceA+Math.PI*3)%(Math.PI*2))-Math.PI);
        if(dd<0.6 && pd0<340 && pd0>b.r*0.6) loseLife();
        if(Math.random()<0.6){ const a=b.faceA+rand(-0.5,0.5), dp=rand(140,320); particles.push({x:b.x+Math.cos(a)*dp,y:b.y+Math.sin(a)*dp,vx:-Math.cos(a)*7,vy:-Math.sin(a)*7,life:0.7,col:'130,90,190'}); }
        if(b.t<=0){ b.st='idle'; b.t=Math.max(0.5,0.9-b.phase*0.12); }
      }
    } else if(b.st==='charge'){
      if(b.tele){ if(b.t<=0){ b.tele=0; b.t=0.55; const a=Math.atan2(b.cy-b.y,b.cx-b.x); b.faceA=a; b.vx=Math.cos(a)*820; b.vy=Math.sin(a)*820; } }
      else {
        moveWithCollision(b,b.x+b.vx*dt,b.y+b.vy*dt);
        if(b.t<=0||b.x<60||b.x>W-60||b.y<60||b.y>H-60){ b.vx=0; b.vy=0; b.st='idle'; b.t=0.6; b.vuln=1.6; }
      }
    } else if(b.st==='spit'){
      if(b.tele){ if(b.t<=0){ b.tele=0; const count=5+b.phase*2, sp=180+b.phase*30; for(let i=0;i<count;i++){ const a=b.faceA-0.5+1.0*(count>1?i/(count-1):0.5); bossBullets.push({x:b.x+Math.cos(a)*b.r,y:b.y+Math.sin(a)*b.r,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:6,life:5}); } beep(260,0.12,'square',0.05); b.st='idle'; b.t=0.7; b.vuln=0.9; } }
    }
  }

  function drawBossDevour(){
    const b=boss; const now=performance.now();
    const acc = b.phase>=3?'190,80,230':(b.phase>=2?'160,90,225':'130,95,205');
    const accD = b.phase>=3?'70,15,90':(b.phase>=2?'55,20,80':'40,25,70');
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*3);
    g.addColorStop(0,'rgba('+accD+',0.6)'); g.addColorStop(0.5,'rgba('+acc+',0.16)'); g.addColorStop(1,'rgba('+accD+',0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*3,0,6.2832); ctx.fill();
    if(b.st==='breath'&&!b.tele){ ctx.fillStyle='rgba(40,12,70,0.22)'; ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.arc(b.x,b.y,360,b.faceA-0.6,b.faceA+0.6); ctx.closePath(); ctx.fill(); }
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.faceA);
    const bg=ctx.createRadialGradient(0,0,b.r*0.2,0,0,b.r);
    bg.addColorStop(0,'rgba('+accD+',0.9)'); bg.addColorStop(1,'rgba('+accD+',0.55)');
    ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(0,0,b.r,0,6.2832); ctx.fill();
    const cr=b.r*0.4;
    const cg=ctx.createRadialGradient(-b.r*0.78,0,0,-b.r*0.78,0,cr*1.8);
    if(b.vuln>0){ cg.addColorStop(0,'rgba(255,240,180,1)'); cg.addColorStop(0.5,'rgba(255,180,95,0.7)'); cg.addColorStop(1,'rgba(255,160,90,0)'); }
    else { cg.addColorStop(0,'rgba('+acc+',0.45)'); cg.addColorStop(1,'rgba('+acc+',0)'); }
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(-b.r*0.78,0,cr*1.8,0,6.2832); ctx.fill();
    ctx.fillStyle=b.vuln>0?'rgba(255,250,225,1)':'rgba(45,22,60,0.85)';
    ctx.beginPath(); ctx.arc(-b.r*0.78,0,cr*0.55,0,6.2832); ctx.fill();
    if(b.vuln>0){ ctx.strokeStyle='rgba(255,235,170,0.9)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(-b.r*0.78,0,cr+Math.sin(now/110)*2.5,0,6.2832); ctx.stroke(); }
    ctx.fillStyle='rgba('+acc+',0.92)';
    ctx.beginPath(); ctx.arc(0,0,b.r,-1.2,1.2); ctx.arc(0,0,b.r*0.46,1.2,-1.2,true); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(235,220,255,0.55)'; ctx.lineWidth=2; ctx.stroke();
    const mo=b.mouth;
    ctx.fillStyle='rgba(12,2,18,'+(0.55+0.45*mo)+')';
    ctx.beginPath(); ctx.moveTo(b.r*0.4,0); ctx.lineTo(b.r*1.02,-(b.r*0.5*mo+4)); ctx.lineTo(b.r*1.18,0); ctx.lineTo(b.r*1.02,(b.r*0.5*mo+4)); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(230,215,255,'+(0.6+0.3*mo)+')';
    for(let i=-1;i<=1;i+=2){ ctx.beginPath(); ctx.moveTo(b.r*0.55,i*(b.r*0.18*mo+2)); ctx.lineTo(b.r*0.95,i*(b.r*0.34*mo+4)); ctx.lineTo(b.r*0.7,i*(b.r*0.05)); ctx.closePath(); ctx.fill(); }
    ctx.restore();
    if(b.st==='charge'&&b.tele){ const a=Math.atan2(b.cy-b.y,b.cx-b.x); ctx.strokeStyle='rgba(200,120,255,'+(0.4+0.35*Math.sin(now/60))+')'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x+Math.cos(a)*Math.max(W,H),b.y+Math.sin(a)*Math.max(W,H)); ctx.stroke(); }
    if(b.st==='breath'&&b.tele){ ctx.strokeStyle='rgba(180,110,240,'+(0.3+0.3*Math.sin(now/50))+')'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*1.6,b.faceA-0.6,b.faceA+0.6); ctx.stroke(); }
  }

  function updateHUD(){
    livesEl.textContent = ('♥ '.repeat(Math.max(0,state.lives)).trim() || '—') + (state.shield?'  ⛊':'');
    levelEl.textContent = '第 '+state.level+' 层';
    if(boss){ if(boss.kind==='shard'){ orbsEl.textContent = boss.stage===2 ? ('击碎空壳 '+(boss.coreHits||0)+' / '+(boss.coreNeed||0)) : ('拼合 '+(boss.placed||0)+' / '+boss.need); } else if(boss.kind==='chorus'){ orbsEl.textContent='自己的声音 '+Math.floor((boss.self||0)*100)+'%'; } else { orbsEl.textContent = '首领 '+'◆'.repeat(Math.max(0,boss.need-boss.hits)); } }
    else if(state.mode==='escape'){ orbsEl.textContent = '逃脱 → 找到出口'; }
    else orbsEl.textContent = '光点 '+orbsGot+' / '+orbsTotal;
  }

  function pulseAffectEnemies(x,y,opts){
    opts=opts||{};
    if(boss && boss.kind==='shard' && boss.phase===2){ boss.flinch=1; }
    if(opts.overload){
      for(const s of shadows){ const dx=s.x-x, dy=s.y-y, d=Math.hypot(dx,dy)||1; if(d<180){ s.vx+=dx/d*460; s.vy+=dy/d*460; } }
    }
    if(opts.silence){ state.silenceT=Math.max(state.silenceT,0.5); }
    for(const h of hunters){ h.lunge=1.1; h.tx=x; h.ty=y; }
    state.alertT = (state.mode==='stealth' ? 3.4 : 1.8);
  }

  function emitPulse(){
    if(player.cool>0) return;
    const cost = state.perks.thrift ? 0.6 : 1;
    if(state.energy < cost){ if((player.noEnergyT||0)<=0){ beep(150,0.1,'square',0.03); player.noEnergyT=0.35; } return; }
    state.energy -= cost;
    player.cool = 0.22;
    const big = (state.perks.overload ? 1.55 : 1) * (theme==='smother' ? 0.5 : 1);
    pulses.push({x:player.x,y:player.y,r:14,max:Math.max(W,H)*1.05*big,speed:560});
    sendOnlinePulse(big);
    if(!isTeamOnline() || isHost()) pulseAffectEnemies(player.x,player.y,{overload:!!state.perks.overload,silence:!!state.perks.silencePulse});
    if(theme==='echo'){ echoQueue.push({x:player.x,y:player.y,t:2.0}); }
    beep(420,0.18,'sine',0.05);
    beep(640,0.12,'sine',0.03);
  }

  function applyItem(type){
    beep(720,0.12,'sine',0.05); beep(960,0.16,'sine',0.04);
    if(type==='shield'){ state.shield=true; }
    else if(type==='lantern'){ state.lanternT=7; }
    else if(type==='silence'){ state.silenceT=5; }
    else if(type==='dash'){ state.dashT=5; }
    updateHUD();
  }
  function collectOrb(index,source){
    const o=orbs[index];
    if(!o || o.got) return false;
    o.got=true; orbsGot=Math.min(orbsTotal, orbsGot+1);
    if(source==='local'){
      sendTeamEvent('collectOrb',{level:state.level,index:index});
      state.energy=Math.min(state.energyMax, state.energy + (state.perks.charge?state.energyMax:0.5));
      beep(880,0.12,'sine',0.06); beep(1170,0.16,'sine',0.04);
      if(o.frag){
        if(state.pendingFrags && state.pendingFrags.length){ showFragment(state.pendingFrags.shift()); }
        else if(state.pendingFrag){ showFragment(state.pendingFrag); state.pendingFrag=''; }
        else if(fragIdx < STORY.frags.length){ showFragment(STORY.frags[fragIdx++]); }
      }
    } else {
      beep(760,0.08,'sine',0.025);
    }
    for(let k=0;k<14;k++) particles.push({x:o.x,y:o.y,vx:rand(-3,3),vy:rand(-3,3),life:1,col:'125,240,200'});
    if(orbsGot>=orbsTotal){ exitOpen=true; if(source==='local') beep(660,0.3,'triangle',0.05); }
    updateHUD();
    return true;
  }
  function collectItem(index,source){
    const it=items[index];
    if(!it || it.got) return false;
    it.got=true;
    if(source==='local'){
      sendTeamEvent('collectItem',{level:state.level,index:index,type:it.type});
      applyItem(it.type);
    } else {
      beep(520,0.08,'sine',0.025);
    }
    for(let k=0;k<16;k++) particles.push({x:it.x,y:it.y,vx:rand(-3.5,3.5),vy:rand(-3.5,3.5),life:1,col:it.col});
    return true;
  }
  function showFragment(text){ state.fragText=text; state.fragT=3.4; }
  function loseLife(){
    if(player.down || player.dead) return;
    if(state.invuln>0) return;
    state.hitFlash=1;
    if(state.shield){ state.shield=false; state.invuln=1.2; state.shake=12; beep(300,0.25,'square',0.06); for(let i=0;i<20;i++) particles.push({x:player.x,y:player.y,vx:rand(-4,4),vy:rand(-4,4),life:1,col:'120,230,255'}); updateHUD(); return; }
    if(state.lives<=1 && state.perks.rekindle && state.rekindleReady){
      state.rekindleReady=false; state.invuln=2.0; state.shake=22;
      for(const s of shadows){ if(Math.hypot(s.x-player.x,s.y-player.y)<200){ s.x+=(s.x-player.x>0?1:-1)*240; s.y+=(s.y-player.y>0?1:-1)*240; } }
      beep(520,0.3,'triangle',0.07); beep(780,0.3,'triangle',0.05);
      for(let i=0;i<30;i++) particles.push({x:player.x,y:player.y,vx:rand(-6,6),vy:rand(-6,6),life:1.3,col:'255,220,140'});
      state.fragText='重燃 · 余光护住了你'; state.fragT=2.2;
      updateHUD(); return;
    }
    state.levelHits++;
    state.lives--; state.invuln=(state.perks.buffer?2.4:1.6); state.shake=18;
    beep(120,0.4,'sawtooth',0.08);
    for(let i=0;i<26;i++) particles.push({x:player.x,y:player.y,vx:rand(-4,4),vy:rand(-4,4),life:1,col:'255,90,120'});
    updateHUD();
    if(state.lives<=0){ gameOver(); }
  }

  function checkTeamWipe(){

    const now=performance.now();

  function updateDownState(dt){
    if(!isTeamOnline()) return;
    if(player.down){
      player.vx=0; player.vy=0;
      player.deadTimer=(player.deadTimer==null?DOWN_TIME:player.deadTimer)-dt;
      let near=false;
      for(const peer of online.peers.values()){
        if(peer.level!==state.level || !peer.running || peer.down || peer.dead) continue;
        if(Math.hypot(peer.x-player.x,peer.y-player.y)<REVIVE_R){ near=true; break; }
      }
      player.reviveProgress=near ? Math.min(REVIVE_TIME,(player.reviveProgress||0)+dt) : Math.max(0,(player.reviveProgress||0)-dt*0.7);
      if(player.reviveProgress>=REVIVE_TIME){
        player.down=false; player.dead=false; player.reviveProgress=0; player.deadTimer=DOWN_TIME;

  function applyInterpolatedEnemies(){

    if(isHost() || !snaps.length) return;

    while(snaps.length>2 && snaps[1].t<renderAt-16) snaps.shift();
    let p=snaps[0], n=snaps[0], a=0;
    if(snaps.length>1){
      p=snaps[snaps.length-2]; n=snaps[snaps.length-1];
      for(let i=1;i<snaps.length;i++){
        if(snaps[i].t>=renderAt){ p=snaps[i-1]; n=snaps[i]; break; }
      }
      const span=Math.max(1, n.t-p.t);
      a=Math.max(0,Math.min(1.3,(renderAt-p.t)/span));
    }
    const ne=n.e||{}, pe=p.e||{};

          const nx=(Number(cur[0])||0)*W, ny=(Number(cur[1])||0)*H;

    mirrors=blend(ne.mirrors,pe.mirrors,mirrors,(x,i,old)=>({x:(Number(x[0])||0)*W,y:(Number(x[1])||0)*H,r:Number(x[2])||10,light:Number(x[3])||old.light||0,frozen:!!x[4],delay:old.delay||1.4,wob:old.wob||0}));

  function guestEnemyCollisions(){
