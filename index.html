    if(state.running) state.levelTime+=dt;
    if(state.mode==='timed'){ state.timeLimit-=dt; if(state.timeLimit<=0){ state.timeLimit=12; loseLife(); state.shake=14; } }
    if(state.bannerT>0) state.bannerT-=dt;
    if(state.celebrateT>0) state.celebrateT-=dt;
    if(state.fragT>0) state.fragT-=dt;
    if(theme==='tide'){
      let nd=99999;
      for(const s of shadows) nd=Math.min(nd,Math.hypot(s.x-player.x,s.y-player.y));
      for(const h of hunters) nd=Math.min(nd,Math.hypot(h.x-player.x,h.y-player.y));
      for(const p of patrollers) nd=Math.min(nd,Math.hypot(p.x-player.x,p.y-player.y));
      const danger=Math.max(0,1-nd/360);
      state.hbPhase=(state.hbPhase||0)+dt*(1.0+danger*4)*6.2832;
      state.hbeat=0.5+0.5*Math.sin(state.hbPhase);
    }
    visMul = (state.lanternT>0 ? 3.2 : 1) * (theme==='fog' ? 0.7 : theme==='abyss' ? 0.82 : 1) * (theme==='memory' ? 1.15 : 1) * (theme==='tide' ? (0.55+0.6*(state.hbeat||0)) : 1) * (theme==='flare' ? (state.flashT>0 ? 6 : 0.78) : 1) * (state.devourDim||1) * (state.perks.visMul||1);

    // movement input
    let ax=0, ay=0;
    if(keys['w']||keys['arrowup']) ay-=1;
    if(keys['s']||keys['arrowdown']) ay+=1;
    if(keys['a']||keys['arrowleft']) ax-=1;
    if(keys['d']||keys['arrowright']) ax+=1;
    if(player.down || player.dead){ ax=0; ay=0; }
    if(ax===0&&ay===0&&joy.active){
      ax=joy.dx; ay=joy.dy;
    } else if(ax===0&&ay===0&&pointer.active){
      const dx=pointer.x-player.x, dy=pointer.y-player.y;
      const d=Math.hypot(dx,dy);
      if(d>6){ ax=dx/d; ay=dy/d; }
    }
    const dashing = state.dashT>0;
    const acc=(dashing?2400:1400)*selectedChar.speed*(state.perks.speedMul||1);
    player.vx += ax*acc*dt; player.vy += ay*acc*dt;
    const fr=Math.pow(theme==='ice'?0.35:0.0015,dt);
    player.vx*=fr; player.vy*=fr;
    if(theme==='storm'){ windT-=dt; if(windT<=0){ windDir=Math.random()<0.5?-1:1; windT=rand(2.5,4.5); } player.vx += windDir*150*dt; }
    if(theme==='flux' && !boss){ state.fluxT=(state.fluxT||0)+dt*0.45; state.fluxX=W*0.5+Math.cos(state.fluxT)*W*0.30; state.fluxY=H*0.5+Math.sin(state.fluxT*1.3)*H*0.30; const fdx=state.fluxX-player.x, fdy=state.fluxY-player.y, fd=Math.hypot(fdx,fdy)||1; player.vx += fdx/fd*240*dt; player.vy += fdy/fd*240*dt; }
    if(theme==='whirl' && !boss){ const wdx=player.x-W/2, wdy=player.y-H/2; player.vx += -wdy*0.85*dt; player.vy += wdx*0.85*dt; }
    const maxv=(dashing?520:300)*selectedChar.speed*(state.perks.speedMul||1);
    const sp=Math.hypot(player.vx,player.vy);
    if(sp>maxv){ player.vx=player.vx/sp*maxv; player.vy=player.vy/sp*maxv; }
    moveWithCollision(player, player.x+player.vx*dt, player.y+player.vy*dt);
    // 玩家拖尾
    const movingT = Math.hypot(player.vx,player.vy) > 12;
    let regenRate = (movingT ? 0.4 : (state.perks.rest ? 1.1 : 0.6)) / (selectedChar.cool||1);
    if(wells.length){ for(const wl of wells){ wl.t+=dt*3; if(Math.hypot(wl.x-player.x,wl.y-player.y)<wl.r){ regenRate += 1.6; wl.on=1; } else wl.on=0; } }
    if(state.energy < state.energyMax) state.energy = Math.min(state.energyMax, state.energy + regenRate*dt);
    player.trail.push({x:player.x, y:player.y});
    const trailMax = Math.round(20*(selectedChar.trailLen||1));
    while(player.trail.length>trailMax) player.trail.shift();
    if(!movingT && player.trail.length>4) player.trail.shift();
    updateRemotePlayers(dt);
    updateDownState(dt);
    sendOnlineState(false);

    // pulses
    for(let i=pulses.length-1;i>=0;i--){
      const p=pulses[i]; p.r += p.speed*dt;
      if(p.r>p.max) pulses.splice(i,1);
    }
    // 影伴：绕玩家旋转并定期放微脉冲
    if(state.perks.companion){
      state.compAng=(state.compAng||0)+dt*1.8;
      state.compT=(state.compT||3.5)-dt;
      if(state.compT<=0){ state.compT=3.5; const cx=player.x+Math.cos(state.compAng)*46, cy=player.y+Math.sin(state.compAng)*46; pulses.push({x:cx,y:cy,r:8,max:Math.max(W,H)*0.4,speed:430,echo:1}); }
    }
    // 残响：延迟重播
    if(theme==='echo'){
      for(let i=echoQueue.length-1;i>=0;i--){ const e=echoQueue[i]; e.t-=dt; if(e.t<=0){ pulses.push({x:e.x,y:e.y,r:12,max:Math.max(W,H)*0.85,speed:520,echo:1}); beep(300,0.16,'sine',0.03); echoQueue.splice(i,1); } }
    }
    // 星垂：流星划过照亮全场
    if(theme==='star'){
      state.starT=(state.starT||rand(2.5,4.5))-dt;
      if(state.starT<=0){ state.starT=rand(4,7); const mx=rand(W*0.15,W*0.85); pulses.push({x:mx,y:-20,r:12,max:Math.hypot(W,H)*1.12,speed:1500,star:1}); meteors.push({x:mx,y:-30,vx:rand(-180,180),vy:1000,life:1.0}); beep(720,0.5,'sine',0.025); }
    }
    // 惊蛰：雷光每隔几秒照亮全场
    if(theme==='flare'){
      state.flareT=(state.flareT||rand(2,3.5))-dt;
      if(state.flareT<=0){ state.flareT=rand(3.5,6); state.flashT=0.9; beep(150,0.5,'sawtooth',0.04); beep(90,0.7,'sine',0.03); }
    }
    if(state.flashT>0) state.flashT-=dt;
    // 心域：走过的路被记住
    if(theme==='memory') memMark(player.x,player.y);
    // 对影：镜像倒影
    if(theme==='twin'){ state.twinX=W-player.x; state.twinY=H-player.y; if(Math.hypot(state.twinX-player.x,state.twinY-player.y)<player.r+11) loseLife(); }
    // 流星位移
    for(let i=meteors.length-1;i>=0;i--){ const m=meteors[i]; m.x+=m.vx*dt; m.y+=m.vy*dt; m.life-=dt; if(m.life<=0||m.y>H+40) meteors.splice(i,1); }
    if(theme==='mirror'){
      const add=[];
      for(const p of pulses){
        if(p.gen) continue;
        if(!p.refl) p.refl={};
        for(let wi=4;wi<walls.length;wi++){
          const w=walls[wi];
          const nx=Math.max(w.x,Math.min(p.x,w.x+w.w)), ny=Math.max(w.y,Math.min(p.y,w.y+w.h));
          const d=Math.hypot(nx-p.x,ny-p.y);
          if(!p.refl[wi] && p.r>20 && Math.abs(d-p.r)<10){
            p.refl[wi]=1;
            const rem=p.max-p.r;
            if(rem>80) add.push({x:nx,y:ny,r:8,max:Math.min(rem,Math.max(W,H)*0.5),speed:p.speed,gen:1});
          }
        }
      }
      for(const a of add) pulses.push(a);
    }
    function litBy(x,y){
      let v=0;
      for(const p of pulses){ const d=Math.hypot(x-p.x,y-p.y); const diff=Math.abs(d-p.r); if(diff<34){ v=Math.max(v, 1-diff/34); } }
      for(const peer of online.peers.values()){
        if(peer.level!==state.level || !peer.running || peer.dead) continue;
        const rr=(peer.down?48:76)*visMul;
        const d=Math.hypot(x-peer.x,y-peer.y);
        if(d<rr) v=Math.max(v,(1-d/rr)*(peer.down?0.32:0.55));
      }
      if(memGrid) v=Math.max(v, memLightAt(x,y));
      return v;
    }

    // orbs
    for(let oi=0; oi<orbs.length; oi++){
      const o=orbs[oi];
      if(o.got){ o.light*=Math.pow(0.02,dt); continue; }
      o.phase+=dt*3;
      if(theme==='fog'){ o.vx=(o.vx||0)+rand(-1,1)*dt*10; o.vy=(o.vy||0)+rand(-1,1)*dt*10; o.vx*=0.95; o.vy*=0.95; o.x+=o.vx; o.y+=o.vy; if(o.x<60||o.x>W-60) o.vx*=-1; if(o.y<60||o.y>H-60) o.vy*=-1; }
      const l=litBy(o.x,o.y); if(l>o.light) o.light=l;
      o.light*=Math.pow(0.12,dt);
      // proximity glow
      const pd=Math.hypot(o.x-player.x,o.y-player.y);
      if(pd<90*visMul) o.light=Math.max(o.light,1-pd/(90*visMul));
      if(pd<player.r+10*(state.perks.pickMul||1)) collectOrb(oi,'local');
    }

    // items
    for(let ii=0; ii<items.length; ii++){
      const it=items[ii];
      if(it.got){ it.light*=Math.pow(0.02,dt); continue; }
      it.phase+=dt*3;
      const l=litBy(it.x,it.y); if(l>it.light) it.light=l;
      it.light*=Math.pow(0.12,dt);
      const ipd=Math.hypot(it.x-player.x,it.y-player.y);
      if(ipd<90*visMul) it.light=Math.max(it.light,1-ipd/(90*visMul));
      if(ipd<player.r+12*(state.perks.pickMul||1)) collectItem(ii,'local');
    }

    // 回忆·幕间：记忆节点
    if(state.interlude){
      const icfg=state.interlude;
      for(const n of interNodes){
        n.phase+=dt*3;
        const l=litBy(n.x,n.y); if(l>n.light) n.light=l;
        const pd=Math.hypot(n.x-player.x,n.y-player.y);
        if(pd<100*visMul) n.light=Math.max(n.light, 1-pd/(100*visMul));
        n.light*=Math.pow(0.12,dt);
        if(n.got) n.light=Math.max(n.light,0.5);
      }
      if(icfg.mode==='corridor'){
        let nxt=null; for(const n of interNodes){ if(!n.got){ nxt=n; break; } }
        if(nxt && Math.hypot(nxt.x-player.x,nxt.y-player.y)<92){
          nxt.got=true; showFragment(nxt.text); beep(520,0.18,'sine',0.05); beep(780,0.16,'sine',0.03);
          for(let k=0;k<14;k++) particles.push({x:nxt.x,y:nxt.y,vx:rand(-3,3),vy:rand(-3,3),life:1.1,col:'255,225,150'});
        }
      } else {
        for(const n of interNodes){ if(n.got) continue; if(Math.hypot(n.x-player.x,n.y-player.y)<player.r+16){ n.got=true; showFragment(n.text); beep(880,0.12,'sine',0.06); beep(1170,0.16,'sine',0.04); for(let k=0;k<14;k++) particles.push({x:n.x,y:n.y,vx:rand(-3,3),vy:rand(-3,3),life:1.1,col:'215,185,255'}); } }
      }
      let got=0; for(const n of interNodes){ if(n.got) got++; }
      if(got>=interNodes.length && !exitOpen){ exitOpen=true; beep(660,0.3,'triangle',0.05); }
      orbsEl.textContent='回忆 '+got+' / '+interNodes.length;
    }
    // 旋转掩体（守望之眼·再临）
    if(boss){ for(const w of walls){ if(w.spin){ w.ang+=(w.spd||0.5)*dt; w.x=w.cx+Math.cos(w.ang)*w.rad-w.w/2; w.y=w.cy+Math.sin(w.ang)*w.rad-w.h/2; } } }
    if(!isTeamOnline() || isHost()){
    // shadows
    for(const s of shadows){
      s.wob+=dt*2;
      const dx=player.x-s.x, dy=player.y-s.y; const d=Math.hypot(dx,dy)||1;
      const frozen = state.silenceT>0;
      if(!frozen){
        const alertM = state.alertT>0 ? 1.5 : 1;
        const home = (d<320 ? 0.6 : 0.12) * alertM;
        s.vx += (dx/d*home + Math.cos(s.wob)*0.5)*dt*60;
        s.vy += (dy/d*home + Math.sin(s.wob*0.7)*0.5)*dt*60;
        const ssp=Math.hypot(s.vx,s.vy); const smax=(60+state.level*6)*(theme==='abyss'?1.3:1)*diff().speed*alertM;
        if(ssp>smax){ s.vx=s.vx/ssp*smax; s.vy=s.vy/ssp*smax; }
        moveWithCollision(s, s.x+s.vx*dt, s.y+s.vy*dt);
        if(s.x<30||s.x>W-30) s.vx*=-1;
        if(s.y<30||s.y>H-30) s.vy*=-1;
      }
      s.frozen=frozen;
      const l=litBy(s.x,s.y); if(l>s.light) s.light=l;
      const pd=Math.hypot(s.x-player.x,s.y-player.y);
      if(pd<80*visMul) s.light=Math.max(s.light,(1-pd/(80*visMul))*0.9);
      if(state.alertT>0) s.light=Math.max(s.light,0.42);
      if(frozen) s.light=Math.max(s.light,0.3);
      s.light*=Math.pow(0.2,dt);
      if(pd<player.r+s.r){ loseLife(); s.x+=dx>0?-40:40; s.y+=dy>0?-40:40; }
    }

    // 猎手
    for(const h of hunters){
      h.wob+=dt*2;
      const frozen = state.silenceT>0;
      if(!frozen){
        if(h.lunge>0){
          h.lunge-=dt;
          const dx=h.tx-h.x, dy=h.ty-h.y, d=Math.hypot(dx,dy)||1;
          h.vx+=dx/d*900*dt; h.vy+=dy/d*900*dt;
          const hmax=300+state.level*8, hsp=Math.hypot(h.vx,h.vy);
          if(hsp>hmax){ h.vx=h.vx/hsp*hmax; h.vy=h.vy/hsp*hmax; }
        } else {
          h.vx*=Math.pow(0.05,dt); h.vy*=Math.pow(0.05,dt);
        }
        moveWithCollision(h, h.x+h.vx*dt, h.y+h.vy*dt);
        if(h.x<30||h.x>W-30) h.vx*=-1;
        if(h.y<30||h.y>H-30) h.vy*=-1;
      }
      h.frozen=frozen;
      const l=litBy(h.x,h.y); if(l>h.light) h.light=l;
      if(h.lunge>0) h.light=Math.max(h.light,0.45);
      const pd=Math.hypot(h.x-player.x,h.y-player.y);
      if(pd<80*visMul) h.light=Math.max(h.light,(1-pd/(80*visMul))*0.9);
      if(frozen) h.light=Math.max(h.light,0.3);
      h.light*=Math.pow(0.2,dt);
      if(pd<player.r+h.r){ loseLife(); h.x+=(h.x-player.x)>0?40:-40; h.y+=(h.y-player.y)>0?40:-40; h.lunge=0; }
    }

    // 巡逻者
    for(const p of patrollers){
      const frozen = state.silenceT>0;
      if(!frozen){
        let nx=p.x+p.vx*dt, ny=p.y+p.vy*dt;
        if(!pointClearOfWalls(nx,p.y,p.r)){ p.vx*=-1; }
        if(!pointClearOfWalls(p.x,ny,p.r)){ p.vy*=-1; }
        if(p.x<30||p.x>W-30) p.vx=-Math.abs(p.vx)*Math.sign(p.x-W/2);
        if(p.y<30||p.y>H-30) p.vy=-Math.abs(p.vy)*Math.sign(p.y-H/2);
        p.x+=p.vx*dt; p.y+=p.vy*dt;
        p.trail.push({x:p.x,y:p.y}); if(p.trail.length>8) p.trail.shift();
      }
      p.frozen=frozen;
      const l=litBy(p.x,p.y); if(l>p.light) p.light=l;
      const pd=Math.hypot(p.x-player.x,p.y-player.y);
      if(pd<80*visMul) p.light=Math.max(p.light,(1-pd/(80*visMul))*0.9);
      if(frozen) p.light=Math.max(p.light,0.3);
      p.light*=Math.pow(0.2,dt);
      if(pd<player.r+p.r){ loseLife(); }
    }

    // 分裂体：被光波击中分裂；最小被击灭；碰到玩家掉命
    for(let i=splitters.length-1;i>=0;i--){
      const z=splitters[i];
      z.wob+=dt*2;
      if(z.hitCd>0) z.hitCd-=dt;
      const frozen = state.silenceT>0;
      const dx=player.x-z.x, dy=player.y-z.y, d=Math.hypot(dx,dy)||1;
      if(!frozen){
        const home = d<300 ? 0.35 : 0.1;
        z.vx += (dx/d*home + Math.cos(z.wob)*0.4)*dt*60;
        z.vy += (dy/d*home + Math.sin(z.wob*0.8)*0.4)*dt*60;
        const zmax=(50+state.level*4+z.gen*30)*diff().speed, zsp=Math.hypot(z.vx,z.vy);
        if(zsp>zmax){ z.vx=z.vx/zsp*zmax; z.vy=z.vy/zsp*zmax; }
        moveWithCollision(z, z.x+z.vx*dt, z.y+z.vy*dt);
        if(z.x<30||z.x>W-30) z.vx*=-1;
        if(z.y<30||z.y>H-30) z.vy*=-1;
      }
      z.frozen=frozen;
      const l=litBy(z.x,z.y); if(l>z.light) z.light=l;
      if(d<80*visMul) z.light=Math.max(z.light,(1-d/(80*visMul))*0.9);
      if(frozen) z.light=Math.max(z.light,0.3);
      z.light*=Math.pow(0.2,dt);
      if(z.hitCd<=0){
        for(const p of pulses){
          if(Math.abs(Math.hypot(z.x-p.x,z.y-p.y)-p.r)<z.r){
            z.hitCd=0.5;
            beep(260,0.12,'square',0.05);
            for(let k=0;k<10;k++) particles.push({x:z.x,y:z.y,vx:rand(-4,4),vy:rand(-4,4),life:0.9,col:'230,120,180'});
            if(z.gen>=2){ splitters.splice(i,1); }
            else {
              const ng=z.gen+1, nr=z.r*0.66;
              for(let s=0;s<2;s++){ const a=Math.random()*6.2832; splitters.push({x:z.x+Math.cos(a)*12,y:z.y+Math.sin(a)*12,vx:Math.cos(a)*80,vy:Math.sin(a)*80,r:nr,gen:ng,light:0.5,wob:rand(0,6.28),hitCd:0.3,frozen:false}); }
              splitters.splice(i,1);
            }
            break;
          }
        }
      }
      if(Math.hypot(z.x-player.x,z.y-player.y)<player.r+z.r){ loseLife(); z.x+=dx>0?-30:30; z.y+=dy>0?-30:30; }
    }
    // 记录玩家轨迹（供镜影延迟跟随）
    if(mirrors.length){
      playerPath.push({x:player.x,y:player.y,t:performance.now()/1000});
      while(playerPath.length>600) playerPath.shift();
    }
    // 镜影：延迟复制玩家走位（碰到掉命，杀不死，可被静默冻结）
    for(const m of mirrors){
      m.wob+=dt*2;
      const frozen = state.silenceT>0;
      if(!frozen){
        const tt=performance.now()/1000 - m.delay;
        let target=null;
        for(let i=0;i<playerPath.length;i++){ if(playerPath[i].t>=tt){ target=playerPath[i]; break; } }
        if(target){ const dx=target.x-m.x, dy=target.y-m.y, d=Math.hypot(dx,dy)||1; const step=Math.min(d,(260+state.level*4)*diff().speed*dt); m.x+=dx/d*step; m.y+=dy/d*step; }
      }
      m.frozen=frozen;
      const l=litBy(m.x,m.y); if(l>m.light) m.light=l;
      const pd=Math.hypot(m.x-player.x,m.y-player.y);
      if(pd<80*visMul) m.light=Math.max(m.light,(1-pd/(80*visMul))*0.9);
      if(frozen) m.light=Math.max(m.light,0.3);
      m.light*=Math.pow(0.2,dt);
      if(pd<player.r+m.r){ loseLife(); }
    }
    // boss
    if(boss) updateBoss(dt);

    // boss 子弹（bounce>0 的会沿墙/边界反弹，用于碎镜之我；普通弹不受影响）
    for(let i=bossBullets.length-1;i>=0;i--){
      const bl=bossBullets[i];
      bl.life-=dt;
      if(bl.bounce>0){
        const nx=bl.x+bl.vx*dt, ny=bl.y+bl.vy*dt;
        if(!pointClearOfWalls(nx,bl.y,0)){ bl.vx*=-1; bl.bounce--; } else bl.x=nx;
        if(!pointClearOfWalls(bl.x,ny,0)){ bl.vy*=-1; bl.bounce--; } else bl.y=ny;
        if(bl.x<8){ bl.x=8; bl.vx=Math.abs(bl.vx); bl.bounce--; }
        else if(bl.x>W-8){ bl.x=W-8; bl.vx=-Math.abs(bl.vx); bl.bounce--; }
        if(bl.y<8){ bl.y=8; bl.vy=Math.abs(bl.vy); bl.bounce--; }
        else if(bl.y>H-8){ bl.y=H-8; bl.vy=-Math.abs(bl.vy); bl.bounce--; }
        if(bl.bounce<0 || bl.life<=0){ bossBullets.splice(i,1); continue; }
      } else {
        bl.x+=bl.vx*dt; bl.y+=bl.vy*dt;
        if(!pointClearOfWalls(bl.x,bl.y,0)){ bossBullets.splice(i,1); continue; }
        if(bl.life<=0||bl.x<0||bl.x>W||bl.y<0||bl.y>H){ bossBullets.splice(i,1); continue; }
      }
      if(dist2(bl.x,bl.y,player.x,player.y)<(bl.r+player.r)*(bl.r+player.r)){ loseLife(); bossBullets.splice(i,1); }
    }
    if(isTeamOnline() && isHost()) sendEnemySnapshot();
    } else {
      applyInterpolatedEnemies();

    function wallLight(w){
      let v=0;
      const pts=[[w.x+w.w/2,w.y+w.h/2],[w.x,w.y],[w.x+w.w,w.y],[w.x,w.y+w.h],[w.x+w.w,w.y+w.h],[w.x+w.w/2,w.y],[w.x+w.w/2,w.y+w.h],[w.x,w.y+w.h/2],[w.x+w.w,w.y+w.h/2]];

        ctx.strokeStyle = low ? 'rgba(255,120,90,0.92)' : 'rgba(140,210,255,0.88)'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(player.x,player.y,player.r+7,-1.5708,-1.5708+ef*6.2832); ctx.stroke();
        for(let i=1;i<state.energyMax;i++){ const a=-1.5708+i/state.energyMax*6.2832; ctx.strokeStyle='rgba(5,8,16,0.9)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(player.x+Math.cos(a)*(player.r+4),player.y+Math.sin(a)*(player.r+4)); ctx.lineTo(player.x+Math.cos(a)*(player.r+10),player.y+Math.sin(a)*(player.r+10)); ctx.stroke(); }
      }
    }
    // 对影：镜像倒影
    if(state.running && theme==='twin' && state.twinX!=null){
      const tx=state.twinX, ty=state.twinY;
      const ar=70*visMul;
      const g=ctx.createRadialGradient(tx,ty,0,tx,ty,ar);
      g.addColorStop(0,'rgba(230,150,240,0.28)');
      g.addColorStop(0.6,'rgba(210,140,230,0.08)');
      g.addColorStop(1,'rgba(210,140,230,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(tx,ty,ar,0,6.2832); ctx.fill();
      ctx.fillStyle='rgba(240,180,250,0.85)'; ctx.beginPath(); ctx.arc(tx,ty,player.r,0,6.2832); ctx.fill();
      ctx.shadowColor='rgba(230,150,240,0.9)'; ctx.shadowBlur=16; ctx.beginPath(); ctx.arc(tx,ty,player.r,0,6.2832); ctx.fill(); ctx.shadowBlur=0;
    }
    // 场景横幅
    if(state.bannerT>0 && state.bannerText){
      const al=Math.max(0,Math.min(1,state.bannerT));
      ctx.save(); ctx.textAlign='center';
      ctx.font='600 '+Math.round(Math.min(W*0.07,34))+'px sans-serif';
      ctx.fillStyle='rgba(220,235,255,'+(al*0.95)+')';
      ctx.shadowColor='rgba(90,150,255,0.7)'; ctx.shadowBlur=20;
      ctx.fillText(state.bannerText, W/2, H*0.26); ctx.shadowBlur=0;
      if(state.bannerSub){ ctx.font='15px sans-serif'; ctx.fillStyle='rgba(170,200,240,'+(al*0.85)+')'; ctx.fillText(state.bannerSub, W/2, H*0.26+32); }
      ctx.restore();
    }
    // 通关庆祝
    if(state.celebrateT>0 && state.celebrateText){
      const ct=state.celebrateT;
      let al=1;
      if(ct>2.2) al=(2.4-ct)/0.2; else if(ct<0.7) al=ct/0.7;
      al=Math.max(0,Math.min(1,al));
      const pop = ct>2.2 ? 1.25-(2.4-ct)/0.2*0.25 : 1;
      const cy=H*0.5;
      ctx.save(); ctx.textAlign='center';
      // 光晕底
      const halo=ctx.createRadialGradient(W/2,cy,0,W/2,cy,W*0.4);
      halo.addColorStop(0,'rgba(255,200,90,'+(al*0.16)+')');
      halo.addColorStop(1,'rgba(255,200,90,0)');
      ctx.fillStyle=halo; ctx.fillRect(0,0,W,H);
      ctx.font='800 '+Math.round(Math.min(W*0.09,52)*pop)+'px sans-serif';
      ctx.shadowColor='rgba(255,210,110,0.95)'; ctx.shadowBlur=32;
      const grd=ctx.createLinearGradient(0,cy-44,0,cy+22);
      grd.addColorStop(0,'rgba(255,245,210,'+al+')'); grd.addColorStop(1,'rgba(255,196,84,'+al+')');
      ctx.fillStyle=grd;
      ctx.fillText(state.celebrateText, W/2, cy); ctx.shadowBlur=0;
      ctx.font='600 '+Math.round(Math.min(W*0.04,17))+'px sans-serif';
      ctx.fillStyle='rgba(255,236,194,'+(al*0.85)+')';
      ctx.fillText('继续深入黑暗 →', W/2, cy+40);
      ctx.restore();
    }
    // 记忆碎片字幕
    if(state.fragT>0 && state.fragText){
      let fa=1; if(state.fragT>3.0) fa=(3.4-state.fragT)/0.4; else if(state.fragT<0.8) fa=state.fragT/0.8;
      fa=Math.max(0,Math.min(1,fa));
      ctx.save(); ctx.textAlign='center';
      ctx.font='italic 500 '+Math.round(Math.min(W*0.05,20))+'px Georgia, serif';
      ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=12;
      ctx.fillStyle='rgba(212,228,255,'+(fa*0.94)+')';
      ctx.fillText(state.fragText, W/2, H*0.8);
      ctx.restore();
    }
    drawScreenFx();
    drawBuffs();
    ctx.setTransform(DPR,0,0,DPR,0,0);
    drawJoystick();
  }

  function drawScreenFx(){
    if(state.flashT>0){ ctx.fillStyle='rgba(210,225,255,'+Math.min(0.22,state.flashT*0.22)+')'; ctx.fillRect(-20,-20,W+40,H+40); }
    if(state.hitFlash>0){
      const a=Math.min(0.62,state.hitFlash*0.62);
      const g=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.62);
      g.addColorStop(0,'rgba(255,40,60,0)');
      g.addColorStop(1,'rgba(255,30,50,'+a+')');
      ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
    }
    if(!state.running) return;
    if(state.alertT>0){
      const a=Math.min(0.3,state.alertT*0.12);
      const g=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.4,W/2,H/2,Math.max(W,H)*0.62);
      g.addColorStop(0,'rgba(255,150,40,0)');
      g.addColorStop(1,'rgba(255,140,30,'+a+')');
      ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
    }
    if(theme==='flux' && state.fluxX!=null){
      const fx=state.fluxX, fy=state.fluxY;
      const g=ctx.createRadialGradient(fx,fy,0,fx,fy,60);
      g.addColorStop(0,'rgba(150,90,200,0.30)'); g.addColorStop(0.5,'rgba(110,60,170,0.12)'); g.addColorStop(1,'rgba(110,60,170,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(fx,fy,60,0,6.2832); ctx.fill();
      ctx.strokeStyle='rgba(190,150,255,0.5)'; ctx.lineWidth=2;
      for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(fx,fy,14+i*12,state.fluxT*2+i,state.fluxT*2+i+4.2); ctx.stroke(); }
    }
    if(state.perks.companion){
      const cx=player.x+Math.cos(state.compAng||0)*46, cy=player.y+Math.sin(state.compAng||0)*46;
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,16);
      g.addColorStop(0,'rgba(190,235,255,0.85)'); g.addColorStop(1,'rgba(190,235,255,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,16,0,6.2832); ctx.fill();
      ctx.fillStyle='rgba(235,250,255,0.95)'; ctx.beginPath(); ctx.arc(cx,cy,3,0,6.2832); ctx.fill();
    }
    if(state.perks.echolocate){
      let tx=null,ty=null,bd=1e9;
      if(state.mode!=='escape'){
        for(const o of orbs){ if(o.got) continue; const d=Math.hypot(o.x-player.x,o.y-player.y); if(d<bd){bd=d;tx=o.x;ty=o.y;} }
      }
      if(tx===null && exit){ tx=exit.x; ty=exit.y; }
      if(tx!==null){
        const a=Math.atan2(ty-player.y,tx-player.x);
        const ox=W/2, oy=H/2, rad=Math.min(W,H)*0.42;
        ctx.save(); ctx.translate(ox+Math.cos(a)*rad, oy+Math.sin(a)*rad); ctx.rotate(a);
        ctx.fillStyle='rgba(150,230,200,0.6)';
        ctx.beginPath(); ctx.moveTo(11,0); ctx.lineTo(-7,-6); ctx.lineTo(-7,6); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }
    if(state.mode==='timed'){
      const tt=Math.max(0,state.timeLimit);
      ctx.save(); ctx.textAlign='center';
      ctx.font='700 '+Math.round(Math.min(W*0.06,26))+'px ui-monospace,monospace';
      ctx.fillStyle = tt<6 ? 'rgba(255,90,90,'+(0.6+0.4*Math.sin(performance.now()/120))+')' : 'rgba(220,235,255,0.9)';
      ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=10;
      ctx.fillText('⏱ '+tt.toFixed(1), W/2, 96); ctx.shadowBlur=0;
      ctx.restore();
    }
  }

  function drawJoystick(){
    if(!joy.active) return;
    ctx.beginPath(); ctx.arc(joy.ox,joy.oy,joy.R,0,6.2832);
    ctx.fillStyle='rgba(20,35,70,0.28)'; ctx.fill();
    ctx.strokeStyle='rgba(120,180,255,0.45)'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(joy.kx,joy.ky,joy.R*0.45,0,6.2832);
    ctx.fillStyle='rgba(120,180,255,0.6)'; ctx.fill();
    ctx.strokeStyle='rgba(210,230,255,0.85)'; ctx.lineWidth=2; ctx.stroke();
  }

  if(connectBtnEl) connectBtnEl.addEventListener('click', connectOnline);
  if(roomInputEl) roomInputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') connectOnline(); });
  if(new URLSearchParams(location.search).get('room')) setTimeout(connectOnline, 250);
  requestAnimationFrame(loop);
})();
</script>
</body>
